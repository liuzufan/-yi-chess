<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>弈 · 棋道</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#1c1917;--ink-s:#44403c;--ink-l:#78716c;--paper:#f5f0e6;--paper-w:#ebe3d2;--paper-d:#d9cdb4;--accent:#8b5e3c;--accent-s:#a47b5a;--accent2:#a8745a;--red:#9a4444;--green:#5a7a52;--gold:#c9a84c;--serif:Georgia,'Noto Serif SC','Songti SC','SimSun','宋体',serif;--xqfont:'Noto Serif SC','Songti SC','SimSun','宋体',serif;--r:6px;--rl:14px}
body{background:var(--paper);background-image:radial-gradient(ellipse at 15% 10%,rgba(139,94,60,.05),transparent 60%),radial-gradient(ellipse at 85% 90%,rgba(139,94,60,.04),transparent 55%);min-height:100vh;display:flex;flex-direction:column;align-items:center;font-family:var(--serif);color:var(--ink);user-select:none;-webkit-tap-highlight-color:transparent;padding:16px 12px 40px}
.entry{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:85vh;animation:fi .8s ease}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.entry h1{font-size:3.5rem;font-weight:400;letter-spacing:20px;padding-left:20px}
.entry .sub{font-size:.78rem;letter-spacing:10px;color:var(--ink-l);margin-bottom:36px;padding-left:10px}
.entry .deco{width:140px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin-bottom:44px}
.entry .deco::after{content:'';display:block;width:6px;height:6px;background:var(--accent);border-radius:50%;margin:-3px auto 0}
.cards{display:flex;gap:32px;flex-wrap:wrap;justify-content:center;max-width:960px}
.card{width:240px;height:300px;border:1px solid var(--paper-d);border-radius:var(--rl);background:var(--paper-w);cursor:pointer;transition:all .4s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 24px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center 30%,rgba(139,94,60,.08),transparent 70%);opacity:0;transition:opacity .4s}
.card::after{content:'';position:absolute;bottom:0;left:50%;width:0;height:2px;background:var(--accent);transition:width .4s,left .4s}
.card:hover{transform:translateY(-6px);box-shadow:0 16px 40px rgba(60,40,10,.12);border-color:var(--accent-s)}
.card:hover::before{opacity:1}.card:hover::after{width:60%;left:20%}
.card svg{width:80px;height:80px;margin-bottom:28px;color:var(--accent);opacity:.65;transition:all .4s}
.card:hover svg{opacity:1;transform:scale(1.05)}
.card .name{font-size:1.25rem;letter-spacing:8px;margin-bottom:10px;font-weight:400}
.card .desc{font-size:.72rem;letter-spacing:2px;color:var(--ink-l);text-align:center;line-height:2}
.game{display:none;width:100%;flex-direction:column;align-items:center}.game.active{display:flex}
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;position:relative}
.nav .back{display:flex;align-items:center;gap:5px;cursor:pointer;color:var(--ink-l);font-size:.8rem;letter-spacing:2px;transition:color .2s;flex-shrink:0;padding:4px 10px;border-radius:20px}
.nav .back:hover{color:var(--accent);background:rgba(139,94,60,.06)}.nav .back svg{width:14px;height:14px}
.nav .title-wrap{display:flex;align-items:center;gap:12px}
.nav .title{font-size:1.15rem;letter-spacing:8px;font-weight:400;white-space:nowrap}
.nav .ln{width:30px;height:1px;background:var(--accent);opacity:.3;flex-shrink:0}
.nav-spacer{flex-shrink:0;min-width:50px}
.bar{display:flex;gap:10px;margin-bottom:8px;font-size:.8rem;align-items:center;flex-wrap:wrap;justify-content:center}
.bar .it{display:flex;align-items:center;gap:7px;padding:5px 14px;border:1px solid var(--paper-d);border-radius:20px;background:var(--paper-w);color:var(--ink-s)}
.si{width:14px;height:14px;border-radius:50%;display:inline-block;flex-shrink:0}
.sb{background:radial-gradient(circle at 35% 35%,#4a4a4a,#1a1a1a);box-shadow:0 1px 2px rgba(0,0,0,.2)}
.sw{background:radial-gradient(circle at 35% 35%,#fff,#d4d4d4);box-shadow:0 1px 2px rgba(0,0,0,.1);border:.5px solid #bbb}
#st{font-weight:600;color:var(--accent);min-width:100px;text-align:center;font-size:.82rem;letter-spacing:1px;transition:color .3s}
.diff-sel{display:flex;gap:6px;margin-bottom:8px;justify-content:center;flex-wrap:wrap}
.diff-sel .diff{padding:4px 14px;font-size:.72rem;border:1px solid var(--paper-d);border-radius:16px;cursor:pointer;color:var(--ink-l);transition:all .2s;letter-spacing:1px}
.diff-sel .diff:hover{border-color:var(--accent-s);color:var(--ink-s)}
.diff-sel .diff.active{background:var(--accent);color:var(--paper);border-color:var(--accent)}
#wrap{position:relative;border-radius:var(--rl);overflow:hidden;box-shadow:0 2px 8px rgba(60,40,10,.1),0 8px 24px rgba(60,40,10,.06),0 0 0 1px rgba(107,82,48,.12);max-width:95vw}
canvas{display:block;cursor:default;touch-action:none}
.ctl{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;justify-content:center}
button{padding:7px 18px;font-size:.8rem;font-family:var(--serif);border:1px solid var(--paper-d);border-radius:var(--r);cursor:pointer;transition:all .2s;font-weight:400;letter-spacing:1px;background:var(--paper-w);color:var(--ink-s);display:inline-flex;align-items:center;gap:5px}
button:hover{background:var(--paper-d);transform:translateY(-1px)}
button:active{transform:translateY(0)}
button svg{width:13px;height:13px;opacity:.7}
button:disabled{opacity:.4;cursor:not-allowed;transform:none}
#rbtn{background:var(--ink);color:var(--paper);border-color:var(--ink)}#rbtn:hover{background:var(--ink-s)}
#ov{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(28,25,23,.82);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s;border-radius:var(--rl)}
#ov.show{opacity:1;pointer-events:all}
#ov h2{font-size:2rem;margin-bottom:8px;font-weight:400;letter-spacing:12px;padding-left:12px}
#ov h2.win{color:#d4a85a}#ov h2.lose{color:#c47878}#ov h2.draw{color:#999}
#ov p{font-size:.82rem;color:#bbb;margin-bottom:18px;letter-spacing:1px}
#obtn{background:var(--paper);color:var(--ink);border:none;padding:9px 28px;font-size:.8rem;letter-spacing:2px}
.ft{margin-top:14px;font-size:.68rem;color:var(--ink-l);opacity:.4;text-align:center;letter-spacing:2px}
#xm{display:none;max-width:560px;width:95vw;margin-top:8px;font-size:.75rem;color:var(--ink-l);max-height:100px;overflow-y:auto;background:var(--paper-w);border:1px solid var(--paper-d);border-radius:var(--r);padding:8px 12px;line-height:1.8}
#xm.show{display:block}
#aiinfo{display:none;max-width:560px;width:95vw;margin-top:6px;font-size:.7rem;color:var(--ink-l);max-height:60px;overflow-y:auto;background:var(--paper-w);border:1px solid var(--paper-d);border-radius:var(--r);padding:6px 12px;line-height:1.7;letter-spacing:.5px}
#aiinfo.show{display:block}
#aiinfo .tag{color:var(--accent);font-weight:600}
.thinking-dot{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--red);margin:0 2px;animation:td 1.4s infinite ease-in-out both}
.thinking-dot:nth-child(2){animation-delay:.2s}
.thinking-dot:nth-child(3){animation-delay:.4s}
@keyframes td{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
/* 先手选择 */
.turn-sel{display:flex;gap:6px;margin-bottom:8px;justify-content:center;flex-wrap:wrap}
.turn-opt{padding:4px 14px;font-size:.72rem;border:1px solid var(--paper-d);border-radius:16px;cursor:pointer;color:var(--ink-l);transition:all .2s;letter-spacing:1px}
.turn-opt:hover{border-color:var(--accent-s);color:var(--ink-s)}
.turn-opt.active{background:var(--accent);color:var(--paper);border-color:var(--accent)}
/* 回放模态框 */
.rp-modal{display:none;position:fixed;inset:0;background:rgba(28,25,23,.85);z-index:100;align-items:center;justify-content:flex-start;flex-direction:column;opacity:0;transition:opacity .3s;overflow-y:auto;padding:50px 20px 20px}
.rp-modal.show{display:flex;opacity:1}
.rp-box{background:var(--paper);border-radius:var(--rl);padding:24px 32px;max-width:520px;width:90vw;max-height:80vh;overflow-y:auto;margin:auto}
.rp-box h3{font-size:1.1rem;letter-spacing:6px;margin-bottom:16px;text-align:center;font-weight:400}
.rp-list{display:flex;flex-direction:column;gap:8px}
.rp-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--paper-w);border:1px solid var(--paper-d);border-radius:var(--r);cursor:pointer;transition:all .2s}
.rp-item:hover{border-color:var(--accent-s);transform:translateX(4px)}
.rp-item .rp-info{font-size:.78rem;color:var(--ink-s)}
.rp-item .rp-result{font-size:.72rem;padding:2px 10px;border-radius:12px}
.rp-item .rp-result.win{background:rgba(90,122,82,.15);color:var(--green)}
.rp-item .rp-result.lose{background:rgba(154,68,68,.15);color:var(--red)}
.rp-item .rp-result.draw{background:rgba(120,113,108,.15);color:var(--ink-l)}
.rp-item .rp-del{font-size:.7rem;color:var(--ink-l);opacity:.5;cursor:pointer;padding:2px 6px}
.rp-item .rp-del:hover{opacity:1;color:var(--red)}
.rp-empty{text-align:center;color:var(--ink-l);font-size:.8rem;padding:20px}
.rp-tabs{display:flex;gap:8px;margin-bottom:14px;justify-content:center;flex-wrap:wrap}
.rp-tab{padding:5px 16px;font-size:.78rem;border:1px solid var(--paper-d);border-radius:16px;cursor:pointer;color:var(--ink-l);transition:all .2s;letter-spacing:1px}
.rp-tab:hover{border-color:var(--accent-s);color:var(--ink-s)}
.rp-tab.active{background:var(--accent);color:var(--paper);border-color:var(--accent)}
@keyframes diffFade{0%{opacity:0;transform:translate(-50%,-50%) scale(.8)}20%{opacity:1;transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-60%) scale(.95)}}
@keyframes spin{to{transform:rotate(360deg)}}
.rp-close{margin-top:16px;width:100%;padding:8px;font-size:.8rem;background:var(--ink);color:var(--paper);border:none;border-radius:var(--r);cursor:pointer}
/* 通用返回按钮(固定在左上角) */
.rp-back{position:fixed;top:16px;left:16px;display:flex;align-items:center;gap:5px;cursor:pointer;color:#f5f0e6;font-size:.8rem;letter-spacing:2px;padding:6px 14px;border:1px solid rgba(217,205,180,.4);border-radius:20px;background:rgba(60,40,10,.6);transition:all .2s;z-index:102;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.rp-back:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.rp-back svg{width:14px;height:14px}
/* 回放查看器 */
.rp-viewer{display:none;position:fixed;inset:0;background:rgba(28,25,23,.92);z-index:101;align-items:center;justify-content:flex-start;flex-direction:column;opacity:0;transition:opacity .3s;overflow-y:auto;padding:56px 16px 20px}
.rp-viewer.show{display:flex;opacity:1}
.rp-vbox{background:var(--paper);border-radius:var(--rl);padding:20px;display:flex;flex-direction:column;align-items:center;gap:12px;max-width:600px;width:90vw;margin:auto}
.rp-vtitle{font-size:.9rem;letter-spacing:3px;color:var(--ink-s)}
.rp-vinfo{font-size:.72rem;color:var(--ink-l)}
.rp-vctl{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center}
.rp-vctl button{padding:6px 16px}
.rp-vstep{font-size:.75rem;color:var(--ink-s);min-width:60px;text-align:center}
.rp-vcomment{background:var(--paper-w);border-radius:var(--rl);padding:10px 14px;margin-top:8px;font-size:.82rem;color:var(--ink);min-height:36px;max-width:560px;line-height:1.7}
.rp-vcomment .rp-who{font-weight:600;font-size:.78rem;padding:2px 8px;border-radius:10px;margin-right:6px}
.rp-vcomment .rp-human{background:rgba(58,122,90,.15);color:#2d6b4f}
.rp-vcomment .rp-ai{background:rgba(200,130,30,.15);color:#a8651a}
.rp-vcomment .rp-key{color:var(--accent);font-weight:600}
.rp-vcomment .rp-val{color:#8b5e3c;font-weight:500}
@media(max-width:640px){.entry h1{font-size:2.2rem;letter-spacing:12px;padding-left:12px}.card{width:170px;height:230px;padding:24px 16px}.card svg{width:56px;height:56px}.card .name{font-size:1rem;letter-spacing:5px}canvas{width:92vw!important;height:92vw!important}button{padding:6px 14px;font-size:.75rem}.nav .title{font-size:1rem;letter-spacing:5px}.nav .ln{width:16px}.nav-spacer{min-width:40px}}
/* 账户系统 */
#acctModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(28,25,23,.45);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
#acctModal.show{display:flex;animation:acctFadeIn .25s ease}
@keyframes acctFadeIn{from{opacity:0}to{opacity:1}}
@keyframes acctSlideUp{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.acct-card{background:linear-gradient(145deg,#faf5ea,#f3ebd9);border-radius:18px;padding:38px 40px;max-width:400px;width:90vw;box-shadow:0 12px 48px rgba(60,40,10,.18),0 2px 8px rgba(60,40,10,.08),inset 0 1px 0 rgba(255,255,255,.6);border:1px solid rgba(217,205,180,.7);animation:acctSlideUp .35s cubic-bezier(.2,.8,.2,1)}
.acct-title{font-size:1.35rem;font-weight:300;letter-spacing:10px;text-align:center;color:var(--accent);margin-bottom:6px;padding-left:10px}
.acct-subtitle{text-align:center;font-size:.68rem;color:var(--ink-l);letter-spacing:3px;margin-bottom:28px;opacity:.7}
.acct-input{width:100%;padding:13px 18px;border:1.5px solid var(--paper-d);border-radius:12px;background:rgba(255,253,247,.7);font-size:.88rem;color:var(--ink-s);margin-bottom:14px;outline:none;caret-color:var(--accent-s);transition:all .3s cubic-bezier(.2,.8,.2,1);letter-spacing:1px;box-shadow:inset 0 1px 3px rgba(60,40,10,.04)}
.acct-input:hover{border-color:var(--accent-s);background:rgba(255,253,247,.9)}
.acct-input:focus{border-color:var(--accent);background:rgba(255,253,247,.95);box-shadow:0 0 0 3px rgba(139,94,60,.08),inset 0 1px 3px rgba(60,40,10,.03)}
.acct-input::placeholder{color:var(--ink-l);opacity:.5}
.acct-btn{width:100%;padding:11px;border:none;border-radius:10px;font-size:.85rem;cursor:pointer;letter-spacing:4px;transition:all .3s cubic-bezier(.2,.8,.2,1);margin-bottom:10px;font-family:var(--serif)}
.acct-btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 3px 12px rgba(139,94,60,.25)}
.acct-btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(139,94,60,.3)}
.acct-btn-primary:active{transform:translateY(0)}
.acct-btn-secondary{background:var(--paper-w);color:var(--ink-s);border:1px solid var(--paper-d)}
.acct-btn-secondary:hover{background:var(--paper-d);transform:translateY(-1px)}
.acct-btn-secondary:active{transform:translateY(0)}
.acct-hint{text-align:center;font-size:.7rem;color:var(--ink-l);margin-top:10px;letter-spacing:1px;opacity:.7;line-height:1.8}
.acct-link{text-align:center;margin-top:14px}
.acct-link a{color:var(--ink-l);font-size:.76rem;text-decoration:none;letter-spacing:2px;cursor:pointer;transition:color .25s;padding:4px 8px;border-radius:6px}
.acct-link a:hover{color:var(--accent)}
.acct-stats{display:flex;justify-content:space-around;margin-bottom:20px;padding:18px;background:linear-gradient(135deg,var(--paper-w),var(--paper-d));border-radius:12px;border:1px solid var(--paper-d)}
.acct-stat{text-align:center}
.acct-stat-num{font-size:1.6rem;font-weight:300;color:var(--accent)}
.acct-stat-label{font-size:.68rem;color:var(--ink-l);letter-spacing:2px;margin-top:4px}
.acct-records{max-height:300px;overflow-y:auto;margin-bottom:16px;border-radius:8px}
.acct-record{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--paper-d);font-size:.78rem;transition:background .2s}
.acct-record:hover{background:rgba(217,205,180,.3)}
.acct-record-result{font-weight:600;padding:2px 8px;border-radius:4px}
.acct-result-win{background:rgba(58,122,90,.15);color:#2d6b4f}
.acct-result-lose{background:rgba(200,80,80,.15);color:#a04040}
.acct-result-draw{background:rgba(120,113,108,.15);color:#57534e}
</style>
</head>
<body>

<div class="entry" id="entry">
<h1>弈</h1>
<div class="sub">棋 道</div>
<div class="deco"></div>
<div class="cards">
<div class="card" onclick="enter('gomoku')">
<svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="1"><rect x="8" y="8" width="64" height="64" rx="2"/><line x1="8" y1="24" x2="72" y2="24"/><line x1="8" y1="40" x2="72" y2="40"/><line x1="8" y1="56" x2="72" y2="56"/><line x1="24" y1="8" x2="24" y2="72"/><line x1="40" y1="8" x2="40" y2="72"/><line x1="56" y1="8" x2="56" y2="72"/><circle cx="24" cy="24" r="5.5" fill="currentColor" opacity=".35"/><circle cx="56" cy="56" r="5.5" fill="none" stroke="currentColor" stroke-width="1.3"/></svg>
<div class="name">五子棋</div><div class="desc">连五为胜<br>攻守兼备</div></div>
<div class="card" onclick="enter('go')">
<svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="1"><rect x="6" y="6" width="68" height="68" rx="2"/><line x1="6" y1="23" x2="74" y2="23"/><line x1="6" y1="40" x2="74" y2="40"/><line x1="6" y1="57" x2="74" y2="57"/><line x1="23" y1="6" x2="23" y2="74"/><line x1="40" y1="6" x2="40" y2="74"/><line x1="57" y1="6" x2="57" y2="74"/><circle cx="23" cy="23" r="3" fill="currentColor" opacity=".5"/><circle cx="57" cy="57" r="3" fill="currentColor" opacity=".5"/><circle cx="40" cy="40" r="6" fill="currentColor" opacity=".2"/><circle cx="57" cy="23" r="6" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
<div class="name">围棋</div><div class="desc">黑白交错<br>围地争雄</div></div>
<div class="card" onclick="enter('xq')">
<svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="1"><rect x="8" y="6" width="64" height="68" rx="2"/><line x1="8" y1="22" x2="72" y2="22"/><line x1="8" y1="58" x2="72" y2="58"/><line x1="22" y1="6" x2="22" y2="22"/><line x1="58" y1="6" x2="58" y2="22"/><line x1="22" y1="58" x2="22" y2="74"/><line x1="58" y1="58" x2="58" y2="74"/><path d="M22 22 L58 58 M58 22 L22 58" stroke-dasharray="2 3" opacity=".35"/><circle cx="40" cy="14" r="4" fill="none"/><circle cx="40" cy="66" r="4" fill="currentColor" opacity=".3"/></svg>
<div class="name">象棋</div><div class="desc">楚河汉界<br>运筹帷幄</div></div>
</div>
<div style="text-align:center;margin-top:20px"><a href="javascript:void(0)" onclick="openAccountModal()" id="acctLink" style="color:var(--ink-l);font-size:.8rem;text-decoration:none;letter-spacing:2px;border-bottom:1px solid var(--paper-d);padding-bottom:2px;transition:color .3s">棋手档案</a></div>
</div>

<div class="game" id="game">
<div class="nav">
<div class="back" onclick="exit()"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M10 3 L5 8 L10 13"/></svg>返回</div>
<div class="title-wrap"><div class="ln"></div><div class="title" id="ntitle">五子棋</div><div class="ln"></div></div>
<div class="nav-spacer"></div>
</div>
<div class="diff-sel" id="diffsel">
<div class="diff" data-d="1" onclick="setDiff(1)">入门</div>
<div class="diff active" data-d="2" onclick="setDiff(2)">进阶</div>
<div class="diff" data-d="3" onclick="setDiff(3)">高手</div>
<div class="diff" data-d="4" onclick="setDiff(4)">大师</div>
</div>
<div class="turn-sel" id="turnsel">
<div class="turn-opt active" data-t="1" onclick="setTurn(1)">玩家先手</div>
<div class="turn-opt" data-t="0" onclick="setTurn(0)">电脑先手</div>

<script>
// ============================================================
//  通用工具与全局状态
// ============================================================
var cv, cx, curGame = 'gomoku', over = false, curDiff = 2;
var playerFirst = true; // 玩家先手
var replayMode = false, replayData = null, replayStep = 0, replayTimer = null;
var gameStartTime = Date.now(); // 游戏开始时间(用于记录每步耗时)
var rpSpeed = 1500; // 回放自动播放间隔(ms) - 默认放慢到1.5秒
var rpHasSuggestion = false; // 当前步是否有AI建议(闪烁中)
var stats = (function(){try{return JSON.parse(localStorage.getItem('gmk_s')||'')}catch(e){}}())||{w:0,l:0,d:0};
function saveS(){try{localStorage.setItem('gmk_s',JSON.stringify(stats))}catch(e){}}
function addS(r){if(r==='w')stats.w++;else if(r==='l')stats.l++;else stats.d++;saveS()}

function $(id){return document.getElementById(id)}
function showOver(t,tx,cls){over=true;var o=$('ov');$('ot').textContent=t;$('ot').className=cls;$('otx').textContent=tx;o.classList.add('show');askSaveOnlineRecord()}
function hideOver(){over=false;$('ov').classList.remove('show')}
var pendingDiff=null; // AI思考期间暂存的难度变更
function setDiff(d){
  // 立即更新视觉状态(不阻塞)
  var ds=document.querySelectorAll('.diff');
  for(var i=0;i<ds.length;i++)ds[i].className='diff'+(parseInt(ds[i].getAttribute('data-d'))===d?' active':'');
  // 立即显示切换提示(不阻塞)
  var diffNames={1:'入门',2:'进阶',3:'高手',4:'大师'};
  var hint=document.createElement('div');
  hint.textContent='难度已切换：'+diffNames[d];
  hint.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(28,25,23,.85);color:#f5f0e6;padding:12px 28px;border-radius:12px;font-size:.9rem;letter-spacing:3px;z-index:9999;pointer-events:none;animation:diffFade 1.2s ease forwards';
  document.body.appendChild(hint);
  setTimeout(function(){if(hint.parentNode)hint.parentNode.removeChild(hint)},1200);
  // 如果AI正在思考,延迟实际变更到AI完成后
  var aiThinking=(curGame==='gomoku'&&gAiThink)||(curGame==='go'&&goAi)||(curGame==='xq'&&xqAi);
  if(aiThinking){
    pendingDiff=d;
  }else{
    curDiff=d;
  }
}
// AI完成后应用暂存的难度变更
function applyPendingDiff(){
  if(pendingDiff!==null){
    curDiff=pendingDiff;
    pendingDiff=null;
  }
}
function showAIInfo(html){
  var el=$('aiinfo');
  if(html){el.innerHTML=html;el.className='show'}
  else el.className='';
}
function setTurn(t){
  playerFirst = t===1;
  var ts=document.querySelectorAll('.turn-opt');
  for(var i=0;i<ts.length;i++)ts[i].className='turn-opt'+(parseInt(ts[i].getAttribute('data-t'))===t?' active':'');
}
// 获取回放列表 - 登录时用用户专属key, 未登录时用游客key
function getReplays(){
  var key=yiCurrentUser?('yi_replays_'+yiCurrentUser):'gmk_replays';
  try{return JSON.parse(localStorage.getItem(key)||'[]')}catch(e){return[]}
}
function saveReplays(arr){
  var key=yiCurrentUser?('yi_replays_'+yiCurrentUser):'gmk_replays';
  try{localStorage.setItem(key,JSON.stringify(arr))}catch(e){}
}
// 保存当前棋局
function saveCurrentGame(){
  var gameType=curGame;
  var moves=[];
  var result='';
  if(over){
    // 判断结果
    var ot=$('ot').className;
    if(ot==='win')result='win';
    else if(ot==='lose')result='lose';
    else result='draw';
  }else{
    result='unfinished';
  }
  if(gameType==='gomoku'){
    moves=gH.map(function(m){return{x:m.x,y:m.y,p:m.p,t:m.t||0}});
  }else if(gameType==='go'){
    moves=goHist.map(function(m){return{x:m.x,y:m.y,c:m.c,cap:m.cap||[],t:m.t||0}});
  }else if(gameType==='xq'){
    moves=xqHist.map(function(m){return{fr:m.fr,fc:m.fc,tr:m.tr,tc:m.tc,piece:m.piece,captured:m.captured,t:m.t||0}});
  }
  if(moves.length===0){alert('空棋局无法保存');return}
  var replays=getReplays();
  var now=new Date();
  var dateStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var names={gomoku:'五子棋',go:'围棋',xq:'象棋'};
  replays.unshift({id:Date.now(),game:gameType,name:names[gameType],date:dateStr,result:result,moves:moves,diff:curDiff,playerFirst:playerFirst});
  if(replays.length>50)replays=replays.slice(0,50); // 最多保存50局
  saveReplays(replays);
  var who=yiCurrentUser?('已保存至棋手「'+yiCurrentUser+'」的档案'):('已保存至本地');
  alert('棋局已保存！\n'+names[gameType]+' · '+dateStr+' · '+moves.length+'手\n'+who);
}
// 打开回放列表
var rpFilter='all'; // 当前棋谱分类
function setRPTab(tab,el){
  rpFilter=tab;
  var ts=document.querySelectorAll('.rp-tab');
  for(var i=0;i<ts.length;i++)ts[i].className='rp-tab';
  el.className='rp-tab active';
  openRPModal();
}
function openRPModal(){
  var replays=getReplays();
  var list=$('rplist');
  // 按分类筛选
  var filtered=rpFilter==='all'?replays:replays.filter(function(r){return r.game===rpFilter});
  var gameNames={gomoku:'五子棋',go:'围棋',xq:'象棋'};
  if(filtered.length===0){
    list.innerHTML='<div class="rp-empty">'+(rpFilter==='all'?'暂无保存的棋局':'暂无'+gameNames[rpFilter]+'棋局')+'</div>';
  }else{
    var resultText={win:'胜',lose:'负',draw:'平',unfinished:'未完'};
    var html='';
    for(var i=0;i<filtered.length;i++){
      var r=filtered[i];
      var cls=r.result==='win'?'win':r.result==='lose'?'lose':'draw';
      var gameTag=gameNames[r.game]||r.game;
      html+='<div class="rp-item" onclick="openRPViewer('+r.id+')">'+
        '<div class="rp-info"><span style="color:var(--accent);font-weight:600;margin-right:6px">['+gameTag+']</span>'+r.name+' · '+r.date+' · '+r.moves.length+'手 · 难度'+r.diff+'</div>'+
        '<div style="display:flex;align-items:center;gap:8px">'+
        '<span class="rp-result '+cls+'">'+resultText[r.result]+'</span>'+
        '<span class="rp-del" onclick="renameReplay('+r.id+',event)">重命名</span>'+
        '<span class="rp-del" onclick="delReplay('+r.id+',event)">删除</span>'+
        '</div></div>';
    }
    list.innerHTML=html;
  }
  $('rpmodal').classList.add('show');
}
function closeRPModal(){$('rpmodal').classList.remove('show')}
function delReplay(id,e){
  e.stopPropagation();
  var replays=getReplays().filter(function(r){return r.id!==id});
  saveReplays(replays);
  openRPModal(); // 刷新列表
}
function renameReplay(id,e){
  e.stopPropagation();
  var replays=getReplays();
  var r=replays.find(function(x){return x.id===id});
  if(!r)return;
  var nm=prompt('请输入新的棋谱名称：',r.name);
  if(nm===null)return;
  nm=nm.trim();
  if(nm===''){alert('名称不能为空');return}
  r.name=nm;
  saveReplays(replays);
  openRPModal(); // 刷新列表
}
// 格式化秒数为 mm:ss
function fmtTime(sec){
  sec=sec||0;
  var m=Math.floor(sec/60),s=sec%60;
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
// 回放查看器
function openRPViewer(id){
  var r=getReplays().find(function(x){return x.id===id});
  if(!r)return;
  replayData=r;replayStep=0;replayMode=true;
  closeRPModal();
  $('rpviewer').classList.add('show');
  $('rpvtitle').textContent=r.name+' 回放';
  var totalTime=r.moves.length>0?(r.moves[r.moves.length-1].t||0):0;
  $('rpvinfo').textContent=r.date+' · '+r.moves.length+'手 · '+(r.result==='win'?'你胜':r.result==='lose'?'你负':r.result==='draw'?'平局':'未完成')+' · 总时长 '+fmtTime(totalTime);
  // 重置讲解区
  var cmt=$('rpvcomment');if(cmt)cmt.textContent='点击「下一步」开始回放，或按「自动」连续播放';
  // 设置画布
  var rpcanvas=$('rpbd');
  var rpcx=rpcanvas.getContext('2d');
  // 保存原始cx,恢复时用
  window._origCx=cx;window._origCv=cv;
  cx=rpcx;cv=rpcanvas;
  // 初始化空棋盘
  if(r.game==='gomoku'){
    rpcanvas.width=GX;rpcanvas.height=GX;
    gB=[];for(var i=0;i<GS;i++)gB.push(new Array(GS).fill(0));
    gLast=null;drawGomoku();
  }else if(r.game==='go'){
    rpcanvas.width=GOSZ;rpcanvas.height=GOSZ;
    goB=[];for(var i=0;i<GSZ;i++)goB.push(new Array(GSZ).fill(0));
    goLast=null;goKo=null;drawGo();
  }else if(r.game==='xq'){
    rpcanvas.width=XW;rpcanvas.height=XH;
    xqB=xqInitBoard();xqSel=null;xqLegal=[];drawXQ();
  }
  rpUpdateStep();
}
function closeRPViewer(){
  replayMode=false;
  rpComebackMode=false;
  rpComebackData=null;
  rpComebackStep=0;
  if(replayTimer){clearTimeout(replayTimer);replayTimer=null}
  if(rpSuggestTimer){clearInterval(rpSuggestTimer);rpSuggestTimer=null}
  $('rpviewer').classList.remove('show');
  $('rpplaybtn').textContent='▶ 自动';
  // 恢复原始canvas
  if(window._origCx){cx=window._origCx;cv=window._origCv}
  // 重绘当前游戏
  if(curGame==='gomoku'&&gB)drawGomoku();
  else if(curGame==='go'&&goB)drawGo();
  else if(curGame==='xq'&&xqB)drawXQ();
}
function rpUpdateStep(){
  var total=replayData?replayData.moves.length:0;
  var stepTxt=replayStep+'/'+total;
  if(replayStep>0&&replayData){
    var curT=replayData.moves[replayStep-1].t||0;
    stepTxt+=' · '+fmtTime(curT);
  }
  $('rpvstep').textContent=stepTxt;
}
function rpSetSpeed(v){
  rpSpeed=parseInt(v,10)||1500;
  // 如果正在自动播放，用新速度重启
  if(replayTimer){
    rpStopAuto();
    rpStartAuto();
  }
}
function rpStopAuto(){
  if(replayTimer){clearTimeout(replayTimer);replayTimer=null}
  $('rpplaybtn').textContent='▶ 自动';
}
function rpStartAuto(){
  var total=replayData.moves.length;
  if(replayStep>=total)replayStep=0;
  $('rpplaybtn').textContent='⏸ 暂停';
  function nextStep(){
    if(replayStep>=total){rpStopAuto();return}
    rpHasSuggestion=false;
    rpApplyMove(replayStep);
    replayStep++;
    rpUpdateStep();
    // 如果当前步触发了AI建议闪烁, 等闪烁完成后再继续
    var wait=rpSpeed;
    if(rpHasSuggestion){
      wait=Math.max(wait,3500); // 闪烁持续3秒+0.5秒缓冲
    }
    replayTimer=setTimeout(nextStep,wait);
  }
  replayTimer=setTimeout(nextStep,rpSpeed);
}
function rpStartComebackAuto(){
  var btn=$('rpplaybtn');
  if(btn)btn.textContent='⏸ 暂停';
  function nextStep(){
    if(!rpComebackMode||!rpComebackData){rpStopAuto();return}
    if(rpComebackStep>=rpComebackData.altMoves.length){rpStopAuto();return}
    rpComebackStep_(1);
    if(rpComebackStep<rpComebackData.altMoves.length){
      replayTimer=setTimeout(nextStep,rpSpeed);
    }else{
      rpStopAuto();
    }
  }
  replayTimer=setTimeout(nextStep,rpSpeed);
}
function rpStep(dir){
  if(!replayData)return;
  if(rpSuggestTimer){clearInterval(rpSuggestTimer);rpSuggestTimer=null}
  // 转败为胜模式: 使用专用步进
  if(rpComebackMode){
    if(dir===0){
      // 自动播放: 切换播放/暂停
      if(replayTimer){rpStopAuto();return}
      rpStartComebackAuto();
      return;
    }
    if(replayTimer){rpStopAuto()}
    rpComebackStep_(dir);
    return;
  }
  var total=replayData.moves.length;
  if(dir===0){
    // 自动播放: 切换播放/暂停
    if(replayTimer){rpStopAuto();return}
    rpStartAuto();
    return;
  }
  if(replayTimer){rpStopAuto()}
  if(dir>0&&replayStep<total){
    rpApplyMove(replayStep);replayStep++;rpUpdateStep();
  }else if(dir<0&&replayStep>0){
    replayStep--;rpRebuildTo(replayStep);rpUpdateStep();
    rpShowComment(replayStep-1,0);
  }
}
// AI讲解: 显示讲解文本
function rpShowComment(idx, goCaptured){
  var el=$('rpvcomment');
  if(!el||!replayData)return;
  if(idx<0){
    el.innerHTML='<span style="color:var(--ink-l)">点击「下一步」开始回放，或按「自动」连续播放。AI将逐步讲解每手棋的意图与优劣。</span>';
    return;
  }
  var m=replayData.moves[idx];
  var moveNum=idx+1;
  var total=replayData.moves.length;
  var isHuman=rpIsHumanMove(idx);
  var whoTag=isHuman?'<span class="rp-who rp-human">你</span>':'<span class="rp-who rp-ai">AI</span>';
  // 判断游戏阶段
  var phase='';
  var progress=idx/total;
  if(progress<0.2)phase='开局';
  else if(progress<0.6)phase='中盘';
  else if(progress<0.85)phase='中后盘';
  else phase='收官';
  // 生成讲解
  var cmt='';
  var suggestion='';
  if(replayData.game==='gomoku'){
    var result=rpGomokuComment(m,idx,phase,total);
    cmt=result.cmt;
    suggestion=result.suggest;
  }else if(replayData.game==='go'){
    var result2=rpGoComment(m,idx,goCaptured,phase,total);
    cmt=result2.cmt;
    suggestion=result2.suggest;
  }else if(replayData.game==='xq'){
    var result3=rpXQComment(m,idx,phase,total);
    cmt=result3.cmt;
    suggestion=result3.suggest;
  }
  var html=whoTag+cmt;
  if(suggestion){
    // 深度验证: 模拟对手反击，检查建议是否成立
    if(suggestion.x!==undefined && !suggestion.verified){
      var verified=rpVerifySuggestion(replayData.game, suggestion, m, idx);
      if(!verified){
        suggestion=null; // 建议不成立，放弃
      }
    }
  }
  if(suggestion){
    html+='<br><span style="color:#8b5e3c;font-size:.76rem;margin-top:4px;display:inline-block">💡 '+suggestion.text+'</span>';
    // 在棋盘上绘制: 玩家实际落子半透明 + AI建议位置闪烁
    if(suggestion.x!==undefined){
      rpHasSuggestion=true;
      // 获取玩家实际落子位置
      var actualMove=null;
      if(replayData.game==='gomoku'){actualMove={x:m.x,y:m.y}}
      else if(replayData.game==='go'){actualMove={x:m.x,y:m.y}}
      else if(replayData.game==='xq'){actualMove={x:m.tc,y:m.tr}}
      rpDrawSuggestion(suggestion.x, suggestion.y, false, suggestion, actualMove);
    }
  }
  el.innerHTML=html;
}

// ============================================================
//  AI建议深度验证 — 模拟对手反击，确保建议成立
// ============================================================
function rpVerifySuggestion(game, sugg, actualMove, idx){
  if(game==='gomoku')return rpVerifyGomokuSugg(sugg, actualMove);
  if(game==='go')return rpVerifyGoSugg(sugg, actualMove);
  if(game==='xq')return rpVerifyXQSugg(sugg, actualMove);
  return true;
}
// 五子棋建议验证: 模拟对手最佳反击
function rpVerifyGomokuSugg(sugg, actualMove){
  var p=replayData.playerFirst?1:2;
  var opp=p===1?2:1;
  var suggX=sugg.x, suggY=sugg.y;
  // 1. 放置建议棋子，检查对手最佳反击
  if(gB[suggY][suggX]!==0)return false;
  gB[suggY][suggX]=p;
  // 搜索对手最佳反击点
  var oppBest=rpGomokuBestReply(opp, p);
  // 模拟对手反击
  if(oppBest){
    gB[oppBest.y][oppBest.x]=opp;
    // 检查对手反击后是否形成更大威胁
    var oppPC=gPatCount(gB, oppBest.x, oppBest.y, opp);
    // 如果对手能形成活四或双活三，建议不成立
    if(oppPC.LIVE_FOUR>0 || oppPC.LIVE_THREE>=2){
      gB[oppBest.y][oppBest.x]=0;
      gB[suggY][suggX]=0;
      return false;
    }
    // 检查我方建议位置是否仍有价值
    var myPC=gPatCount(gB, suggX, suggY, p);
    if(myPC.LIVE_FOUR===0 && myPC.LIVE_THREE===0 && myPC.RUSH_FOUR===0){
      // 建议位置在对手反击后既无活四也无活三冲四，价值不够
      gB[oppBest.y][oppBest.x]=0;
      gB[suggY][suggX]=0;
      // 但如果是防守建议，仍然有效
      if(sugg.text && sugg.text.indexOf('防守')>=0)return true;
      return false;
    }
    gB[oppBest.y][oppBest.x]=0;
  }
  gB[suggY][suggX]=0;
  return true;
}
// 五子棋: 找对手最佳反击点(简化搜索)
function rpGomokuBestReply(opp, my){
  var best=null, bestScore=-1;
  for(var y=0;y<GS;y++)for(var x=0;x<GS;x++){
    if(gB[y][x]!==0)continue;
    gB[y][x]=opp;
    var pc=gPatCount(gB, x, y, opp);
    gB[y][x]=0;
    var score=pc.LIVE_FOUR*1000+pc.RUSH_FOUR*200+pc.LIVE_THREE*100+pc.SLEEP_THREE*30+pc.LIVE_TWO*10;
    gB[y][x]=my;
    var dpc=gPatCount(gB, x, y, my);
    gB[y][x]=0;
    var defScore=dpc.LIVE_FOUR*1000+dpc.RUSH_FOUR*200+dpc.LIVE_THREE*100;
    var total=Math.max(score, defScore*0.9);
    var nearAny=false;
    for(var dx=-2;dx<=2&&!nearAny;dx++)for(var dy=-2;dy<=2;dy++){
      var nx=x+dx,ny=y+dy;
      if(nx>=0&&nx<GS&&ny>=0&&ny<GS&&gB[ny][nx]!==0){nearAny=true;break}
    }
    if(nearAny)total+=1;
    if(total>bestScore){bestScore=total;best={x:x,y:y}}
  }
  if(!best){
    for(var y2=0;y2<GS;y2++)for(var x2=0;x2<GS;x2++){
      if(gB[y2][x2]===0)return {x:x2,y:y2};
    }
  }
  return best;
}
// 围棋建议验证: 检查建议位置是否会被立即提子
function rpVerifyGoSugg(sugg, actualMove){
  // 简化验证: 检查建议位置落子后是否自陷死地
  var myColor=replayData.playerFirst?1:2;
  var testB=[];
  for(var i=0;i<GSZ;i++)testB.push(goB[i].slice());
  var r=goTry(testB, sugg.x, sugg.y, myColor, goKo);
  if(!r.valid)return false;
  testB=r.newBoard;
  // 检查落子后己方棋串气数
  var info=rpGoGroupInfoOnBoard(testB, sugg.x, sugg.y, myColor);
  if(info.libs===0)return false; // 自杀，不成立
  if(info.libs===1){
    // 只剩1气，容易被提，检查对方是否能立即提
    var oppColor=myColor===1?2:1;
    for(var d=0;d<4;d++){
      var dirs=[[0,1],[0,-1],[1,0],[-1,0]];
      var nx=sugg.x+dirs[d][0], ny=sugg.y+dirs[d][1];
      if(nx<0||nx>=GSZ||ny<0||ny>=GSZ)continue;
      if(testB[nx][ny]===0){
        var testR=goTry(testB, nx, ny, oppColor, null);
        if(testR.valid){
          var afterB=testR.newBoard;
          var afterInfo=rpGoGroupInfoOnBoard(afterB, sugg.x, sugg.y, myColor);
          if(afterInfo.libs===0)return false; // 会被提
        }
      }
    }
  }
  return true;
}
function rpGoGroupInfoOnBoard(board, x, y, color){
  if(board[x][y]!==color)return {libs:0};
  var visited={};
  var stack=[[x,y]];
  var libs=0;
  while(stack.length>0){
    var pos=stack.pop();
    var key=pos[0]+','+pos[1];
    if(visited[key])continue;
    visited[key]=1;
    var dirs=[[0,1],[0,-1],[1,0],[-1,0]];
    for(var d=0;d<4;d++){
      var nx=pos[0]+dirs[d][0],ny=pos[1]+dirs[d][1];
      if(nx<0||nx>=GSZ||ny<0||ny>=GSZ)continue;
      if(board[nx][ny]===0)libs++;
      else if(board[nx][ny]===color&&!visited[nx+','+ny])stack.push([nx,ny]);
    }
  }
  return {libs:libs};
}
// 象棋建议验证: 模拟对手反击，检查是否丢子
function rpVerifyXQSugg(sugg, actualMove){
  var playerIsRed=replayData.playerFirst;
  var suggX=sugg.x, suggY=sugg.y;
  var fromX=sugg.fromX, fromY=sugg.fromY;
  if(fromX===undefined)return true; // 非走法建议(如"大子微调")
  // 1. 执行建议走法
  var savedBoard=[];
  for(var i=0;i<xqB.length;i++)savedBoard.push(xqB[i].slice());
  var piece=xqB[fromY][fromX];
  var cap=xqB[suggY][suggX];
  xqB[suggY][suggX]=piece;
  xqB[fromY][fromX]=0;
  // 2. 检查走法后是否被将军
  if(xqCheck(xqB, playerIsRed)){
    xqB=savedBoard;
    return false; // 走法后仍被将军，不成立
  }
  // 3. 模拟对手最佳反击: 找最大吃子
  var oppMoves=xqLegalMoves(xqB, !playerIsRed);
  var bestCapture=null, bestCapVal=0;
  for(var i2=0;i2<oppMoves.length;i2++){
    var mv=oppMoves[i2];
    if(mv.captured && mv.captured!==0){
      var val=XV[mv.captured]||0;
      if(val>bestCapVal){bestCapVal=val;bestCapture=mv}
    }
  }
  // 4. 如果对手能吃我方大子(>=400)，检查我方能否反吃或是否值得
  if(bestCapture && bestCapVal>=400){
    // 检查我方走法吃到的子价值
    var myCapVal=cap?XV[cap]||0:0;
    // 如果我方没吃到东西(0)但对方能吃我大子(>=400)，建议不成立
    if(myCapVal===0 && bestCapVal>=400){
      // 除非这是防守建议
      if(sugg.text && sugg.text.indexOf('防守')>=0){
        xqB=savedBoard;
        return true;
      }
      xqB=savedBoard;
      return false;
    }
    // 如果对方吃的比我吃的大，不成立
    if(bestCapVal>myCapVal){
      xqB=savedBoard;
      return false;
    }
  }
  xqB=savedBoard;
  return true;
}

var rpComebackData=null; // 转败为胜分析结果

function rpAnalyzeComeback(){
  if(!replayData)return;
  var result=replayData.result;
  if(result!=='lose'){
    alert('只有输掉的棋局才能进行转败为胜分析');

  }
  var btn=$('rpcomebackbtn');
  if(btn)btn.textContent='分析中...';

  setTimeout(function(){
    var analysis=null;
    if(replayData.game==='gomoku')analysis=rpGomokuComeback();
    else if(replayData.game==='go')analysis=rpGoComeback();
    else if(replayData.game==='xq')analysis=rpXQComeback();

    replayStep=analysis.turningPoint;

}

// 转败为胜模式下的步进
function rpComebackStep_(dir){
  if(!rpComebackData)return;
  var tp=rpComebackData.turningPoint;
  var altLen=rpComebackData.altMoves.length;
  if(dir>0){
    if(rpComebackStep<altLen){
      // 应用AI替代走法
      var altM=rpComebackData.altMoves[rpComebackStep];
      rpApplyAltMove(altM);
      rpComebackStep++;
    }
  }else if(dir<0){
    if(rpComebackStep>0){
      rpComebackStep--;
      // 重建到转折点+当前AI步数
      rpRebuildToComeback(tp+rpComebackStep);
    }
  }
  rpShowComebackComment();
}

// === 五子棋转败为胜分析 ===
function rpGomokuComeback(){
  var moves=replayData.moves;
  var p=replayData.playerFirst?1:2;
  var opp=p===1?2:1;
  if(moves.length<6)return null;
  // 1. 找转折点: 逐步回放，评估每步后的局面
  var evaluations=[];
  var tempB=[];
  for(var i=0;i<GS;i++)tempB.push(new Array(GS).fill(0));
  for(var i2=0;i2<moves.length;i2++){
    var m=moves[i2];
    tempB[m.y][m.x]=m.p;
    // 评估局面 (玩家视角，正数=玩家优势)
    var evalScore=rpEvalGomokuPos(tempB, p, opp);
    evaluations.push({idx:i2, eval:evalScore, isPlayer:m.p===p});
  }
  // 2. 找最大的劣势转折: 玩家走法后局面急剧恶化
  var turningPoint=-1, worstDrop=0;
  for(var i3=0;i3<evaluations.length;i3++){
    if(!evaluations[i3].isPlayer)continue;
    var prevEval=i3>0?evaluations[i3-1].eval:0;
    var drop=prevEval-evaluations[i3].eval;
    if(drop>worstDrop){
      worstDrop=drop;
      turningPoint=i3;
    }
  }
  // 如果没找到明显转折点，找第一个玩家走法后局面变为负数的位置
  if(turningPoint<0){
    for(var i4=0;i4<evaluations.length;i4++){
      if(evaluations[i4].isPlayer && evaluations[i4].eval<-100){
        turningPoint=i4;
        break;
      }
    }
  }
  if(turningPoint<0)turningPoint=Math.floor(moves.length/2); // 兜底: 中间位置
  // 3. 从转折点开始生成AI替代棋路
  // 重建棋盘到转折点前
  var comebackB=[];
  for(var i5=0;i5<GS;i5++)comebackB.push(new Array(GS).fill(0));
  for(var i6=0;i6<turningPoint;i6++){
    var m6=moves[i6];
    comebackB[m6.y][m6.x]=m6.p;
  }
  // 4. 生成替代走法(最多20手)
  var altMoves=[];
  var savedGB=gB;
  gB=comebackB;
  for(var step=0;step<20;step++){
    // 判断该谁走
    var prevMove=turningPoint+step>0?moves[turningPoint+step-1]:null;
    // 第step=0时，该玩家走(替代转折点这一步)
    var isPlayerStep=(step%2===0);
    var curColor=isPlayerStep?p:opp;
    var bestM=rpGomokuBestForComeback(curColor, curColor===p?opp:p);
    if(!bestM)break;
    gB[bestM.y][bestM.x]=curColor;
    // 检查是否连五
    var pc=gPatCount(gB, bestM.x, bestM.y, curColor);
    var comment='';
    if(isPlayerStep){
      if(pc.FIVE>0){
        comment='连五获胜！'+rpGomokuComebackReason(bestM, pc, true);
        altMoves.push({x:bestM.x,y:bestM.y,p:curColor,isPlayer:true,comment:comment});
        break;
      }
      comment=rpGomokuComebackReason(bestM, pc, true);
    }else{
      if(pc.FIVE>0){
        comment='对手连五，AI模拟失败';
        altMoves.push({x:bestM.x,y:bestM.y,p:curColor,isPlayer:false,comment:comment});
        break;
      }
      comment=rpGomokuComebackReason(bestM, pc, false);
    }
    altMoves.push({x:bestM.x,y:bestM.y,p:curColor,isPlayer:isPlayerStep,comment:comment});
    // 如果连续5步后玩家优势明显，可以提前结束
    if(step>=6){
      var evalNow=rpEvalGomokuPos(gB, p, opp);
      if(evalNow>500)break;
    }
  }
  gB=savedGB;
  if(altMoves.length===0)return null;
  // 恢复棋盘到转折点
  var savedGB2=gB;
  gB=[];
  for(var i7=0;i7<GS;i7++)gB.push(new Array(GS).fill(0));
  for(var i8=0;i8<turningPoint;i8++){
    var m8=moves[i8];
    gB[m8.y][m8.x]=m8.p;
  }
  var actualMove=moves[turningPoint];
  var actualPC=gPatCount(gB, actualMove.x, actualMove.y, p);
  gB=savedGB2;
  return {
    turningPoint: turningPoint,
    reason: '第'+(turningPoint+1)+'手是转折点。你此手仅'+rpPCDesc(actualPC)+'，局面开始恶化。以下是AI的替代方案，展示如何从这一步开始扭转局势：',
    altMoves: altMoves
  };
}
function rpGomokuComebackReason(m, pc, isPlayer){
  if(pc.FIVE>0)return '连五获胜';
  if(pc.LIVE_FOUR>0)return '形成活四，对手无法阻止连五';
  if(pc.RUSH_FOUR>0)return '形成冲四，迫使对手应招';
  if(pc.LIVE_THREE>=2)return '形成双活三，双线威胁';
  if(pc.LIVE_THREE>0)return '形成活三，持续施压';
  if(pc.SLEEP_THREE>0)return '形成眠三，埋伏待发';
  if(pc.LIVE_TWO>0)return '形成活二，积蓄攻势';
  // 检查是否是防守走法
  var oppThreats=rpScanGomokuThreats(isPlayer?(replayData.playerFirst?2:1):(replayData.playerFirst?1:2), isPlayer?(replayData.playerFirst?1:2):(replayData.playerFirst?2:1));
  if(!oppThreats.severe && !oppThreats.moderate)return '成功防守对方威胁，化解攻势';
  return '占据要点，控制局势';
}
// 五子棋: 为转败为胜生成最佳走法(攻防一体)
function rpGomokuBestForComeback(p, opp){
  var best=null, bestScore=-1;
  // 先检测对方当前的威胁等级(决定是否需要防守)
  var oppThreats=rpScanGomokuThreats(opp, p);
  var mustDefend=oppThreats.severe || oppThreats.moderate;
  // 检测对方是否有连五手段
  var oppCanWin=rpCanGomokuWinNext(opp);
  for(var y=0;y<GS;y++)for(var x=0;x<GS;x++){
    if(gB[y][x]!==0)continue;
    var total=0;
    // 进攻分: 在此落子后己方形成的棋型
    gB[y][x]=p;
    var pc=gPatCount(gB, x, y, p);
    gB[y][x]=0;
    var offScore=pc.FIVE*10000+pc.LIVE_FOUR*1000+pc.RUSH_FOUR*200+pc.LIVE_THREE*100+pc.SLEEP_THREE*30+pc.LIVE_TWO*10;
    // 如果己方能连五，直接选这个位置
    if(pc.FIVE>0){return {x:x,y:y}}
    // 防守分: 在此落子后，对方的威胁是否减少
    var defScore=0;
    if(mustDefend||oppCanWin){
      gB[y][x]=p;
      var threatsAfter=rpScanGomokuThreats(opp, p);
      var oppCanWinAfter=rpCanGomokuWinNext(opp);
      gB[y][x]=0;
      if(!threatsAfter.severe && !threatsAfter.moderate && !oppCanWinAfter)defScore=500;
      else if(!threatsAfter.severe && !oppCanWinAfter)defScore=300;
      else if(!oppCanWinAfter)defScore=150;
    }
    // 综合: 如果对方有威胁，优先防守；否则进攻
    if(mustDefend||oppCanWin){
      total=Math.max(offScore, defScore);
    }else{
      total=offScore;
    }
    // 位置加分
    var nearAny=false;
    for(var dx=-2;dx<=2&&!nearAny;dx++)for(var dy=-2;dy<=2;dy++){
      var nx=x+dx,ny=y+dy;
      if(nx>=0&&nx<GS&&ny>=0&&ny<GS&&gB[ny][nx]!==0){nearAny=true;break}
    }
    if(nearAny)total+=1;
    if(total>bestScore){bestScore=total;best={x:x,y:y}}
  }
  if(!best || bestScore<0){
    for(var y2=0;y2<GS;y2++)for(var x2=0;x2<GS;x2++){
      if(gB[y2][x2]===0)return {x:x2,y:y2};
    }
  }
  return best;
}
// 五子棋局面评估
function rpEvalGomokuPos(board, p, opp){
  var myScore=0, oppScore=0;
  for(var y=0;y<GS;y++)for(var x=0;x<GS;x++){
    if(board[y][x]===p){
      var savedB=gB;
      gB=board;
      var pc=gPatCount(gB, x, y, p);
      gB=savedB;
      myScore+=pc.LIVE_FOUR*1000+pc.RUSH_FOUR*200+pc.LIVE_THREE*100+pc.SLEEP_THREE*30+pc.LIVE_TWO*10;
    }else if(board[y][x]===opp){
      var savedB2=gB;
      gB=board;
      var pc2=gPatCount(gB, x, y, opp);
      gB=savedB2;
      oppScore+=pc2.LIVE_FOUR*1000+pc2.RUSH_FOUR*200+pc2.LIVE_THREE*100+pc2.SLEEP_THREE*30+pc2.LIVE_TWO*10;
    }
  }
  return myScore-oppScore;
}

// === 围棋转败为胜分析 ===
function rpGoComeback(){
  var moves=replayData.moves;
  var p=replayData.playerFirst?1:2;
  var opp=p===1?2:1;
  if(moves.length<6)return null;
  // 评估每步后的局面(简化: 棋子数+气数)
  var evaluations=[];
  var tempB=[];
  for(var i=0;i<GSZ;i++)tempB.push(new Array(GSZ).fill(0));
  var ko=null;
  for(var i2=0;i2<moves.length;i2++){
    var m=moves[i2];
    var r=goTry(tempB,m.x,m.y,m.c,ko);
    if(r.valid){tempB=r.newBoard;ko=r.newKo}
    var evalScore=rpEvalGoPos(tempB, p, opp);
    evaluations.push({idx:i2, eval:evalScore, isPlayer:m.c===p});
  }
  // 找转折点
  var turningPoint=-1, worstDrop=0;
  for(var i3=0;i3<evaluations.length;i3++){
    if(!evaluations[i3].isPlayer)continue;
    var prevEval=i3>0?evaluations[i3-1].eval:0;
    var drop=prevEval-evaluations[i3].eval;
    if(drop>worstDrop){worstDrop=drop;turningPoint=i3}
  }
  if(turningPoint<0){
    for(var i4=0;i4<evaluations.length;i4++){
      if(evaluations[i4].isPlayer && evaluations[i4].eval<-10){
        turningPoint=i4;break;
      }
    }
  }
  if(turningPoint<0)turningPoint=Math.floor(moves.length/2);
  // 生成替代走法
  var comebackB=[];
  for(var i5=0;i5<GSZ;i5++)comebackB.push(new Array(GSZ).fill(0));
  var cbKo=null;
  for(var i6=0;i6<turningPoint;i6++){
    var m6=moves[i6];
    var r6=goTry(comebackB,m6.x,m6.y,m6.c,cbKo);
    if(r6.valid){comebackB=r6.newBoard;cbKo=r6.newKo}
  }
  var altMoves=[];
  var savedGoB=goB, savedGoKo=goKo;
  goB=comebackB;goKo=cbKo;
  for(var step=0;step<20;step++){
    var isPlayerStep=(step%2===0);
    var curColor=isPlayerStep?p:opp;
    var bestM=rpGoBestForComeback(curColor, curColor===p?opp:p);
    if(!bestM)break;
    var r=goTry(goB,bestM.x,bestM.y,curColor,goKo);
    if(!r.valid)break;
    goB=r.newBoard;goKo=r.newKo;
    var comment;
    if(isPlayerStep){
      comment=rpGoComebackReason(bestM, curColor);
    }else{
      comment=rpGoComebackReason(bestM, curColor);
    }
    altMoves.push({x:bestM.x,y:bestM.y,c:curColor,isPlayer:isPlayerStep,comment:comment});
    if(step>=8){
      var evalNow=rpEvalGoPos(goB, p, opp);
      if(evalNow>30)break;
    }
  }
  goB=savedGoB;goKo=savedGoKo;
  if(altMoves.length===0)return null;
  return {
    turningPoint: turningPoint,
    reason: '第'+(turningPoint+1)+'手是转折点。此后局面逐渐失控。以下是AI的替代方案，展示如何从这一步开始扭转局势：',
    altMoves: altMoves
  };
}
function rpGoComebackReason(m, color){
  // 检查附近棋形
  var info=rpGoGroupInfo(m.x, m.y, color);
  if(info.libs<=2)return '紧气攻击对方弱棋';
  // 检查是否在围空
  var nearMy=false;
  for(var dx=-1;dx<=1;dx++)for(var dy=-1;dy<=1;dy++){
    var nx=m.x+dx,ny=m.y+dy;
    if(nx>=0&&nx<GSZ&&ny>=0&&ny<GSZ&&goB[nx][ny]===color)nearMy=true;
  }
  if(nearMy)return '配合己方棋子，巩固地盘';
  return '抢占要点，拓展势力';
}
function rpGoBestForComeback(myColor, oppColor){
  // 简化: 找能攻击对方弱棋或扩张己方的最佳点
  var best=null, bestScore=-1;
  for(var x=0;x<GSZ;x++)for(var y=0;y<GSZ;y++){
    if(goB[x][y]!==0)continue;
    var r=goTry(goB,x,y,myColor,goKo);
    if(!r.valid)continue;
    var testB=r.newBoard;
    var score=0;
    // 检查是否攻击对方弱棋
    for(var dx=-2;dx<=2;dx++)for(var dy=-2;dy<=2;dy++){
      var nx=x+dx,ny=y+dy;
      if(nx<0||nx>=GSZ||ny<0||ny>=GSZ)continue;
      if(testB[nx][ny]===oppColor){
        var info=rpGoGroupInfoOnBoard(testB,nx,ny,oppColor);
        if(info.libs<=2)score+=50-info.libs*10;
      }
    }
    // 检查是否围空
    for(var dx2=-1;dx2<=1;dx2++)for(var dy2=-1;dy2<=1;dy2++){
      var nx2=x+dx2,ny2=y+dy2;
      if(nx2>=0&&nx2<GSZ&&ny2>=0&&ny2<GSZ&&goB[nx2][ny2]===myColor)score+=5;
    }
    // 边角加分
    if(x<=2||x>=16||y<=2||y>=16)score+=3;
    // 确保有基本分
    score+=1;
    if(score>bestScore){bestScore=score;best={x:x,y:y}}
  }
  return best;
}
function rpEvalGoPos(board, p, opp){
  var myCount=0, oppCount=0, myLibs=0, oppLibs=0;
  for(var x=0;x<GSZ;x++)for(var y=0;y<GSZ;y++){
    if(board[x][y]===p)myCount++;
    else if(board[x][y]===opp)oppCount++;
  }
  // 简化评估: 棋子数差 + 危险棋串惩罚
  var myDanger=0, oppDanger=0;
  var visited={};
  for(var x2=0;x2<GSZ;x2++)for(var y2=0;y2<GSZ;y2++){
    if(board[x2][y2]===0||visited[x2+','+y2])continue;
    var c=board[x2][y2];
    var info=rpGoGroupInfoOnBoard(board,x2,y2,c);
    // 标记已访问
    var stack=[[x2,y2]];
    while(stack.length>0){
      var pos=stack.pop();
      if(visited[pos[0]+','+pos[1]])continue;
      visited[pos[0]+','+pos[1]]=1;
      var dirs=[[0,1],[0,-1],[1,0],[-1,0]];
      for(var d=0;d<4;d++){
        var nx=pos[0]+dirs[d][0],ny=pos[1]+dirs[d][1];
        if(nx>=0&&nx<GSZ&&ny>=0&&ny<GSZ&&board[nx][ny]===c&&!visited[nx+','+ny])stack.push([nx,ny]);
      }
    }
    if(info.libs<=2){
      if(c===p)myDanger+=(3-info.libs)*5;
      else oppDanger+=(3-info.libs)*5;
    }
  }
  return (myCount-oppCount)+(oppDanger-myDanger);
}

// === 象棋转败为胜分析 ===
function rpXQComeback(){
  var moves=replayData.moves;
  var playerIsRed=replayData.playerFirst;
  if(moves.length<6)return null;
  // 评估每步后的局面(子力差)
  var evaluations=[];
  var tempB=xqInitBoard();
  for(var i=0;i<moves.length;i++){
    var m=moves[i];
    tempB[m.tr][m.tc]=m.piece;
    tempB[m.fr][m.fc]=0;
    var evalScore=rpEvalXQPos(tempB, playerIsRed);
    var isPlayer=xqRedP(m.piece)===playerIsRed;
    evaluations.push({idx:i, eval:evalScore, isPlayer:isPlayer});
  }
  // 找转折点
  var turningPoint=-1, worstDrop=0;
  for(var i2=0;i2<evaluations.length;i2++){
    if(!evaluations[i2].isPlayer)continue;
    var prevEval=i2>0?evaluations[i2-1].eval:0;
    var drop=prevEval-evaluations[i2].eval;
    if(drop>worstDrop){worstDrop=drop;turningPoint=i2}
  }
  if(turningPoint<0){
    for(var i3=0;i3<evaluations.length;i3++){
      if(evaluations[i3].isPlayer && evaluations[i3].eval<-100){
        turningPoint=i3;break;
      }
    }
  }
  if(turningPoint<0)turningPoint=Math.floor(moves.length/2);
  // 生成替代走法
  var comebackB=xqInitBoard();
  for(var i4=0;i4<turningPoint;i4++){
    var m4=moves[i4];
    comebackB[m4.tr][m4.tc]=m4.piece;
    comebackB[m4.fr][m4.fc]=0;
  }
  var altMoves=[];
  var savedXQ=xqB;
  xqB=comebackB;
  for(var step=0;step<20;step++){
    var isPlayerStep=(step%2===0);
    var curRed=isPlayerStep?playerIsRed:!playerIsRed;
    var bestM=rpXQBestForComeback(curRed);
    if(!bestM)break;
    var piece=xqB[bestM.fr][bestM.fc];
    var cap=xqB[bestM.tr][bestM.tc];
    xqB[bestM.tr][bestM.tc]=piece;
    xqB[bestM.fr][bestM.fc]=0;
    var col='abcdefghi';
    var desc=XC_H[piece]+'('+col[bestM.fc]+(10-bestM.fr)+'→'+col[bestM.tc]+(10-bestM.tr)+')';
    var comment;
    if(isPlayerStep){
      comment=desc;
      if(cap&&cap!==0)comment+='，吃对方'+XC_H[cap];
    }else{
      comment=desc;
      if(cap&&cap!==0)comment+='，吃你'+XC_H[cap];
    }
    altMoves.push({fr:bestM.fr,fc:bestM.fc,tr:bestM.tr,tc:bestM.tc,piece:piece,isPlayer:isPlayerStep,comment:comment});
    // 检查是否将死
    if(xqCheck(xqB, !curRed)){
      // 检查是否无解
      var escapeMoves=xqLegalMoves(xqB, !curRed);
      var canEscape=false;
      for(var e=0;e<escapeMoves.length;e++){
        var em=escapeMoves[e];
        var ep=xqB[em.fr][em.fc];
        var ec=xqB[em.tr][em.tc];
        xqB[em.tr][em.tc]=ep;xqB[em.fr][em.fc]=0;
        if(!xqCheck(xqB, !curRed))canEscape=true;
        xqB[em.fr][em.fc]=ep;xqB[em.tr][em.tc]=ec;
        if(canEscape)break;
      }
      if(!canEscape){
        altMoves[altMoves.length-1].comment=comment+'，将军！对方无解，将死获胜';
        break;
      }
    }
    if(step>=8){
      var evalNow=rpEvalXQPos(xqB, playerIsRed);
      if(evalNow>300)break;
    }
  }
  xqB=savedXQ;
  if(altMoves.length===0)return null;
  return {
    turningPoint: turningPoint,
    reason: '第'+(turningPoint+1)+'手是转折点。此后子力劣势扩大。以下是AI的替代方案，展示如何从这一步开始扭转局势：',
    altMoves: altMoves
  };
}
function rpXQBestForComeback(isRed){
  var allMoves=xqLegalMoves(xqB, isRed);
  if(allMoves.length===0)return null;
  var best=null, bestScore=-99999;
  for(var i=0;i<allMoves.length;i++){
    var mv=allMoves[i];
    var piece=xqB[mv.fr][mv.fc];
    var cap=xqB[mv.tr][mv.tc];
    // 执行走法
    xqB[mv.tr][mv.tc]=piece;
    xqB[mv.fr][mv.fc]=0;
    // 检查是否被将军(不能送将)
    if(xqCheck(xqB, isRed)){
      xqB[mv.fr][mv.fc]=piece;
      xqB[mv.tr][mv.tc]=cap;
      continue;
    }
    var score=0;
    // 吃子加分
    if(cap&&cap!==0)score+=XV[cap]||0;
    // 被反吃扣分
    if(xqCanCapture(xqB, !isRed, mv.tr, mv.tc)){
      score-=XV[piece]||0;
    }
    // 将军加分
    if(xqCheck(xqB, !isRed))score+=50;
    // 位置评估
    score+=(isRed?(mv.tr<5?2:0):(mv.tr>4?2:0));
    // 确保有基本分(避免全0时返回null)
    score+=1;
    xqB[mv.fr][mv.fc]=piece;
    xqB[mv.tr][mv.tc]=cap;
    if(score>bestScore){bestScore=score;best=mv}
  }
  // 兜底: 如果所有走法都送将(不应该发生)，返回第一个合法走法
  if(!best && allMoves.length>0){
    best=allMoves[0];
  }
  return best;
}
function rpEvalXQPos(board, playerIsRed){
  var myScore=0, oppScore=0;
  for(var r=0;r<10;r++)for(var c=0;c<9;c++){
    var piece=board[r][c];
    if(piece===0)continue;
    var val=XV[piece]||0;
    if(xqRedP(piece)===playerIsRed)myScore+=val;
    else oppScore+=val;
  }
  return myScore-oppScore;
}

// 判断这步棋是人类还是AI下的
function rpIsHumanMove(idx){
  var r=replayData;
  var m=r.moves[idx];
  if(r.game==='gomoku'||r.game==='go'){
    var playerColor=r.playerFirst?1:2;
    return m.p===playerColor||m.c===playerColor;
  }else if(r.game==='xq'){
    var playerIsRed=r.playerFirst;
    var moverRed=m.piece>=1&&m.piece<=7;
    return playerIsRed===moverRed;
  }
  return true;
}

// 五子棋AI建议: 全面评估局面，防守优先原则
// 核心逻辑:
//   1. 撤销玩家落子，检查对方在落子前是否有必须防守的威胁
//   2. 如果对方有威胁(活三/活四/双活三等):
//      a. 如果玩家实际落子成功防住了威胁 -> 正确防守，不给进攻建议
//      b. 如果玩家没防住 -> 建议正确防守位置
//      c. 除非玩家能直接连五/活四获胜(进攻就是最好的防守)
//   3. 如果对方没有威胁 -> 检查是否有更好的进攻点
function rpFindBetterGomokuMove(curX, curY, p, opp, idx){
  // 计算玩家实际落子形成的棋型
  var actualPC=gPatCount(gB, curX, curY, p);
  var actualOffScore=actualPC.LIVE_FOUR*1000 + actualPC.RUSH_FOUR*200 + actualPC.LIVE_THREE*100 + actualPC.SLEEP_THREE*30 + actualPC.LIVE_TWO*10;

  // 撤销玩家落子，在落子前的棋盘上分析
  gB[curY][curX]=0;

  // 1. 检查对方在玩家落子前是否有威胁(需要玩家防守的)
  var oppThreats=rpScanGomokuThreats(opp, p);
  // 2. 检查玩家是否有直接获胜手段(连五/活四)
  var myWinMove=rpScanGomokuWinMove(p);

  // 恢复玩家落子
  gB[curY][curX]=p;

  // 情况A: 玩家实际落子直接获胜 -> 不给建议
  if(actualPC.FIVE>0 || actualPC.LIVE_FOUR>0)return null;

  // 情况B: 玩家有直接获胜手段(连五)但没走 -> 建议获胜
  if(myWinMove && myWinMove.score>=10000){
    return {text:'AI建议下('+myWinMove.x+','+myWinMove.y+')。理由：此处可直接连五获胜！这是唯一的致胜点，你实际落子错失了直接取胜的机会', x:myWinMove.x, y:myWinMove.y, isOpp:false, verified:true};
  }

  // 情况C: 玩家有活四手段但没走 -> 建议活四
  if(myWinMove && myWinMove.score>=1000 && actualOffScore<1000){
    return {text:'AI建议下('+myWinMove.x+','+myWinMove.y+')。理由：此处可形成活四，对手无法阻止连五，等同获胜。你实际下法仅'+rpPCDesc(actualPC)+'，错失致胜良机', x:myWinMove.x, y:myWinMove.y, isOpp:false, verified:true};
  }

  // 情况D: 对方有严重威胁(活四/双冲四/双活三) -> 必须防守
  if(oppThreats.severe){
    // 检查玩家实际落子是否防住了对方的严重威胁
    var oppThreatsAfter=rpScanGomokuThreats(opp, p);
    if(!oppThreatsAfter.severe){
      // 玩家成功消除了严重威胁(冲四/活四等)，正确！不给建议
      // 即使还有活三(moderate)也正确，因为堵冲四优先级高于堵活三
      return null;
    }
    // 玩家没防住严重威胁
    gB[curY][curX]=0;
    var bestDef=rpFindBestGomokuDefense(opp, p);
    // 验证: 即使在最佳防守点落子，对方是否仍能连五
    var canDefend=false;
    if(bestDef){
      gB[bestDef.y][bestDef.x]=p;
      var threatsAfterDef=rpScanGomokuThreats(opp, p);
      // 检查对方是否有连五手段(堵了这端，对方另一端还能连五)
      var oppCanWin=rpCanGomokuWinNext(opp);
      gB[bestDef.y][bestDef.x]=0;
      if(!threatsAfterDef.severe && !oppCanWin)canDefend=true;
    }
    gB[curY][curX]=p;
    if(!canDefend){
      // 绝杀: 怎么防都防不住
      // 但仍然给出最佳防守位置(至少能拖延)，同时提示问题出在更早
      var preventable=rpCheckPreventableLoss(curX, curY, p, opp, idx, oppThreats.desc);
      if(preventable)return preventable;
      // 如果无法追溯，仍然给出防守建议(哪怕只能拖延)
      if(bestDef){
        return {text:'AI建议下('+bestDef.x+','+bestDef.y+')。理由：对方'+oppThreats.desc+'已形成绝杀，此处是最佳防守点，虽无法完全化解但可拖延对方取胜节奏。实际局面已难以挽回', x:bestDef.x, y:bestDef.y, isOpp:false, verified:true};
      }
      return null;
    }
    // 可以防住，建议正确防守位置
    if(bestDef){
      return {text:'AI建议下('+bestDef.x+','+bestDef.y+')。理由：对方形成了'+oppThreats.desc+'，必须立即防守！你实际落子未能化解对方威胁，不防守将直接败北。此处是最佳防守点', x:bestDef.x, y:bestDef.y, isOpp:false, verified:true};
    }
    return null;
  }

  // 情况E: 对方有一般威胁(活三) -> 通常需要防守
  if(oppThreats.moderate){
    var oppThreatsAfter2=rpScanGomokuThreats(opp, p);
    if(!oppThreatsAfter2.severe && !oppThreatsAfter2.moderate){
      // 玩家防住了活三且无其他威胁，正确！
      return null;
    }
    // 玩家没防住活三
    // 除非玩家能形成更强的威胁(冲四/双活三)让对方被迫防守
    if(actualOffScore>=200){
      // 玩家形成了冲四或双活三，以攻代守，可以接受
      return null;
    }
    // 建议防守
    gB[curY][curX]=0;
    var bestDef2=rpFindBestGomokuDefense(opp, p);
    gB[curY][curX]=p;
    if(bestDef2){
      return {text:'AI建议下('+bestDef2.x+','+bestDef2.y+')。理由：对方有'+oppThreats.desc+'，若不防守下一手对方将形成更大威胁。你实际落子未堵住对方攻势，应优先防守。此处是最佳防守点', x:bestDef2.x, y:bestDef2.y, isOpp:false, verified:true};
    }
    return null;
  }

  // 情况F: 对方没有威胁 -> 纯进攻局面，检查是否有更好的进攻点
  if(actualPC.LIVE_FOUR>0 || actualPC.RUSH_FOUR>0)return null;
  gB[curY][curX]=0;
  var bestAtk=null, bestAtkScore=0;
  for(var y=0;y<GS;y++)for(var x=0;x<GS;x++){
    if(gB[y][x]!==0)continue;
    gB[y][x]=p;
    var pc2=gPatCount(gB, x, y, p);
    gB[y][x]=0;
    var s2=pc2.LIVE_FOUR*1000 + pc2.RUSH_FOUR*200 + pc2.LIVE_THREE*100 + pc2.SLEEP_THREE*30 + pc2.LIVE_TWO*10;
    if(s2>bestAtkScore){bestAtkScore=s2;bestAtk={x:x,y:y,pc:pc2}}
  }
  gB[curY][curX]=p;
  if(!bestAtk || bestAtkScore < actualOffScore+100)return null;
  if(bestAtkScore>=1000){
    return {text:'AI建议下('+bestAtk.x+','+bestAtk.y+')。理由：当前局面对方无威胁，此处可形成活四，是最强进攻手。你实际下法仅'+rpPCDesc(actualPC)+'，错失了扩大优势的机会', x:bestAtk.x, y:bestAtk.y, isOpp:false, verified:true};
  }
  if(bestAtkScore>=200 && bestAtk.pc.LIVE_THREE>=2 && actualOffScore<200){
    return {text:'AI建议下('+bestAtk.x+','+bestAtk.y+')。理由：当前局面对方无威胁，此处可形成双活三，攻势更盛。你实际下法仅'+rpPCDesc(actualPC)+'，攻击力不足', x:bestAtk.x, y:bestAtk.y, isOpp:false, verified:true};
  }
  if(bestAtkScore>=100 && bestAtk.pc.LIVE_THREE>=1 && actualOffScore<100){
    return {text:'AI建议下('+bestAtk.x+','+bestAtk.y+')。理由：当前局面对方无威胁，此处能形成活三，抢占先手。你实际落子仅'+rpPCDesc(actualPC)+'，未能给对手制造足够压力', x:bestAtk.x, y:bestAtk.y, isOpp:false, verified:true};
  }
  return null;
}
// 检查上一步是否有避免绝杀的走法(预防性建议)
// 如果当前局面已被绝杀(怎么防都防不住)，检查玩家上一步是否有替代走法能避免
function rpCheckPreventableLoss(curX, curY, p, opp, idx, threatDesc){
  // 需要至少有2步以上的历史才能回溯
  if(idx<2)return null;
  // 找到上一步玩家的走法
  var prevIdx=idx-2; // 对方走法在idx-1，玩家上一步在idx-2
  if(prevIdx<0||!rpIsHumanMove(prevIdx))return null;
  var prevMove=replayData.moves[prevIdx];
  if(!prevMove)return null;
  // 重建到上一步玩家落子前的棋盘
  var savedGB=gB;
  var tempB=[];
  for(var i=0;i<GS;i++)tempB.push(new Array(GS).fill(0));
  for(var i2=0;i2<prevIdx;i2++){
    var m=replayData.moves[i2];
    tempB[m.y][m.x]=m.p;
  }
  gB=tempB;
  // 搜索: 玩家上一步如果换个位置下，对方下一步(实际走法)后是否还会被绝杀
  var prevX=prevMove.x, prevY=prevMove.y;
  var actualOppMove=replayData.moves[idx-1]; // 对方实际的走法
  var bestAvoid=null;
  for(var y=0;y<GS;y++)for(var x=0;x<GS;x++){
    if(gB[y][x]!==0)continue;
    if(x===prevX&&y===prevY)continue;
    // 试放替代走法
    gB[y][x]=p;
    // 模拟对方实际走法
    if(actualOppMove && gB[actualOppMove.y][actualOppMove.x]===0){
      gB[actualOppMove.y][actualOppMove.x]=opp;
      // 检查对方走法后是否仍有严重威胁
      var threats=rpScanGomokuThreats(opp, p);
      gB[actualOppMove.y][actualOppMove.x]=0;
      if(!threats.severe){
        // 这个替代走法避免了绝杀!
        bestAvoid={x:x,y:y};
      }
    }
    gB[y][x]=0;
    if(bestAvoid)break;
  }
  gB=savedGB;
  if(bestAvoid){
    return {text:'AI建议：此局面已被对方'+threatDesc+'绝杀，无论怎么防守都无法挽回。问题出在更早的第'+(prevIdx+1)+'手——如果当时下('+bestAvoid.x+','+bestAvoid.y+')，就能阻止对方形成'+threatDesc+'。回看第'+(prevIdx+1)+'手时会有详细建议', verified:true};
  }
  // 绝杀无法避免，不给建议
  return null;
}
// 检查指定方是否有连五手段(下一步即可获胜)
function rpCanGomokuWinNext(color){
  for(var y=0;y<GS;y++)for(var x=0;x<GS;x++){
    if(gB[y][x]!==0)continue;
    gB[y][x]=color;
    var pc=gPatCount(gB, x, y, color);
    gB[y][x]=0;
    if(pc.FIVE>0)return true;
  }
  return false;
}
// 扫描五子棋对方威胁等级(在当前棋盘上)
function rpScanGomokuThreats(opp, my){
  var severe=false, moderate=false, desc='';
  // 最高优先级: 检测对方下一步能否连五(包括活四和冲四)
  if(rpCanGomokuWinNext(opp)){
    return {severe:true, moderate:false, desc:'冲四(对方下一步可连五)'};
  }
  for(var y=0;y<GS;y++)for(var x=0;x<GS;x++){
    if(gB[y][x]!==opp)continue;
    var pc=gPatCount(gB, x, y, opp);
    if(pc.LIVE_FOUR>0){severe=true;desc='活四';return {severe:severe,moderate:moderate,desc:desc}}
    if(pc.RUSH_FOUR>=2){severe=true;desc='双冲四';return {severe:severe,moderate:moderate,desc:desc}}
    if(pc.LIVE_THREE>=2){severe=true;desc='双活三';return {severe:severe,moderate:moderate,desc:desc}}
    if(pc.RUSH_FOUR>0 && pc.LIVE_THREE>0){severe=true;desc='冲四带活三';return {severe:severe,moderate:moderate,desc:desc}}
    if(pc.LIVE_THREE>0){moderate=true;desc='活三'}
  }
  return {severe:severe,moderate:moderate,desc:desc};
}
// 扫描五子棋是否有直接获胜手段(连五/活四)
function rpScanGomokuWinMove(p){
  var best=null, bestScore=0;
  for(var y=0;y<GS;y++)for(var x=0;x<GS;x++){
    if(gB[y][x]!==0)continue;
    gB[y][x]=p;
    var pc=gPatCount(gB, x, y, p);
    gB[y][x]=0;
    var score=0;
    if(pc.FIVE>0)score=10000;
    else if(pc.LIVE_FOUR>0)score=1000;
    if(score>bestScore){bestScore=score;best={x:x,y:y,score:score}}
  }
  return best;
}
// 寻找五子棋最佳防守点(堵对方最强威胁)
function rpFindBestGomokuDefense(opp, my){
  var best=null, bestReduce=-1;
  for(var y=0;y<GS;y++)for(var x=0;x<GS;x++){
    if(gB[y][x]!==0)continue;
    // 试放己方棋子，检查对方威胁是否减少
    gB[y][x]=my;
    var threats=rpScanGomokuThreats(opp, my);
    gB[y][x]=0;
    var reduce=0;
    if(!threats.severe && !threats.moderate)reduce=100;
    else if(!threats.severe)reduce=50;
    // 位置加分: 靠近对方棋子的防守更有价值
    var nearOpp=false;
    for(var dx=-2;dx<=2&&!nearOpp;dx++)for(var dy=-2;dy<=2;dy++){
      var nx=x+dx,ny=y+dy;
      if(nx>=0&&nx<GS&&ny>=0&&ny<GS&&gB[ny][nx]===opp){nearOpp=true;break}
    }
    if(nearOpp)reduce+=1;
    if(reduce>bestReduce){bestReduce=reduce;best={x:x,y:y}}
  }
  // 兜底: 返回任意空位
  if(!best){
    for(var y2=0;y2<GS;y2++)for(var x2=0;x2<GS;x2++){
      if(gB[y2][x2]===0)return {x:x2,y:y2};
    }
  }
  return best;
}
// 描述五子棋棋型(用于建议文案)
function rpPCDesc(pc){
  if(pc.LIVE_FOUR>0)return '形成活四';
  if(pc.RUSH_FOUR>0)return '形成冲四';
  if(pc.LIVE_THREE>0)return '形成活三';
  if(pc.SLEEP_THREE>0)return '形成眠三';
  if(pc.LIVE_TWO>0)return '形成活二';
  return '无明显威胁';
}
// 围棋讲解
function rpGoComment(m, idx, goCaptured, phase, total){
  var x=m.x, y=m.y;
  var capCount=goCaptured||(m.cap?m.cap.length:0);
  var cmt='', suggest='';

  if(capCount>0){
    if(capCount>=3){
      cmt='<span class="rp-key">大屠杀！</span>提子'+capCount+'颗，局势逆转';
    }else if(capCount===2){
      cmt='<span class="rp-key">双提！</span>吃掉对方2子，收获不小';
    }else{
      cmt='提子1颗，削弱对方棋形';
    }
  }else{
    var isCorner=(x<=5&&y<=5)||(x<=5&&y>=13)||(x>=13&&y<=5)||(x>=13&&y>=13);
    var isSide=(x<=2||x>=16||y<=2||y>=16);
    var isCenter=(x>=7&&x<=11&&y>=7&&y<=11);

    if(phase==='开局'){
      if(isCorner) cmt='角部定式，抢占根据地。金角银边草肚皮';
      else if(isSide) cmt='边路拆边，扩展势力范围';
      else if(isCenter) cmt='中腹落子，着眼全局厚薄';
      else cmt='开局布阵，构筑基本骨架';
    }else if(phase==='中盘'){
      // 检查附近是否有接触战
      var opp=m.c===1?2:1, nearOpp=false, oppCount=0, myCount=0;
      for(var dx=-2;dx<=2&&!nearOpp;dx++)for(var dy=-2;dy<=2;dy++){
        var nx=x+dx,ny=y+dy;
        if(nx>=0&&nx<GSZ&&ny>=0&&ny<GSZ){
          if(goB[nx][ny]===opp){nearOpp=true;oppCount++}
          else if(goB[nx][ny]===m.c)myCount++;
        }
      }
      if(nearOpp){
        if(oppCount>myCount) cmt='防守补强，巩固薄弱棋形';
        else cmt='进攻作战，接触对方棋形';
      }else{
        cmt='抢占要点，拓展地盘';
      }
    }else{
      cmt=phase==='收官'?'收官定型，精打细算每一目':'中后盘，积蓄厚势以待收官';
    }
  }

  // 人类着法建议: 围棋建议需谨慎，优先检查是否在应对紧急局面
  if(rpIsHumanMove(idx) && capCount===0){
    var opp2=m.c===1?2:1;
    var bestGoSuggest=rpFindBetterGoMove(x,y,m.c,opp2,phase);
    if(bestGoSuggest){
      // 围棋绝杀检测: 如果己方有1气棋串且无法救活，不给建议
      var myDanger=rpScanGoDanger(m.c);
      if(myDanger && myDanger.libs===1){
        // 检查是否能救活
        var canSave=false;
        var dirs=[[0,1],[0,-1],[1,0],[-1,0]];
        for(var d=0;d<4;d++){
          var sx=myDanger.x+dirs[d][0], sy=myDanger.y+dirs[d][1];
          if(sx>=0&&sx<GSZ&&sy>=0&&sy<GSZ&&goB[sx][sy]===0){
            var testR=goTry(goB,sx,sy,m.c,goKo);
            if(testR.valid){
              var testB=testR.newBoard;
              var afterInfo=rpGoGroupInfoOnBoard(testB,myDanger.x,myDanger.y,m.c);
              if(afterInfo.libs>=3){canSave=true;break}
            }
          }
        }
        if(!canSave){
          // 绝杀: 棋串将被提，无法挽救，不给当前步建议
          suggest=null;
        }else{
          suggest=bestGoSuggest;
        }
      }else{
        suggest=bestGoSuggest;
      }
    }
    if(!suggest){
      // 如果这步远离主战场，给出建议
      var nearAny=false;
      for(var dx2=-4;dx2<=4&&!nearAny;dx2++)for(var dy2=-4;dy2<=4;dy2++){
        var nx2=x+dx2,ny2=y+dy2;
        if(nx2>=0&&nx2<GSZ&&ny2>=0&&ny2<GSZ&&goB[nx2][ny2]!==0){nearAny=true;break}
      }
      if(!nearAny && phase!=='开局'){
        suggest={text:'AI建议：此手远离主战场，周围无棋子配合，效率较低。应优先在棋形密集处落子，与己方棋子形成呼应，或攻击对方弱棋，才能发挥每手棋的最大价值', verified:true};
      }
    }
  }

  return {cmt: cmt, suggest: suggest};
}
// 围棋AI建议: 优先检查紧急局面，不盲目建议进攻
// 核心逻辑:
//   1. 检查玩家落子前，己方是否有棋串处于危险中(<=2气)
//   2. 如果己方有危险棋串:
//      a. 玩家实际落子是否在救棋(增加气数) -> 正确，不给建议
//      b. 玩家没救棋 -> 建议救棋位置
//   3. 如果己方无危险，检查对方是否有弱棋可攻
//   4. 如果都没有，检查围空效率
function rpFindBetterGoMove(curX, curY, myColor, oppColor, phase){
  // 保存当前棋盘状态(包含玩家落子后的状态)
  var savedBoard=[];
  for(var i=0;i<GSZ;i++)savedBoard.push(goB[i].slice());
  var savedKo=goKo;

  // 撤销玩家落子: 重建到玩家落子前的棋盘
  goB=[];
  for(var i2=0;i2<GSZ;i2++)goB.push(new Array(GSZ).fill(0));
  goKo=null;goLast=null;
  for(var i3=0;i3<replayStep-1;i3++){
    var m3=replayData.moves[i3];
    var r3=goTry(goB,m3.x,m3.y,m3.c,goKo);
    if(r3.valid){goB=r3.newBoard;goKo=r3.newKo;goLast={x:m3.x,y:m3.y,c:m3.c}}
  }

  var result=null;

  // 1. 检查己方是否有危险棋串(<=2气) - 需要紧急处理
  var myDanger=rpScanGoDanger(myColor);
  if(myDanger){
    // 检查玩家实际落子是否在救棋(落子位置在危险棋串附近)
    var nearDanger=false;
    for(var dx=-1;dx<=1&&!nearDanger;dx++)for(var dy=-1;dy<=1;dy++){
      var nx=curX+dx,ny=curY+dy;
      if(nx>=0&&nx<GSZ&&ny>=0&&ny<GSZ){
        // 恢复棋盘检查玩家落子后该位置的状态
        var testB=[];
        for(var bi=0;bi<GSZ;bi++)testB.push(goB[bi].slice());
        var testR=goTry(testB,curX,curY,myColor,goKo);
        if(testR.valid){
          testB=testR.newBoard;
          // 检查落子后危险是否缓解
          var myDangerAfter=rpScanGoDangerOnBoard(testB,myColor);
          if(!myDangerAfter)nearDanger=true;
        }
      }
    }
    if(!nearDanger){
      // 玩家没救棋，建议救棋位置
      var saveMove=rpFindGoSaveMove(myColor);
      if(saveMove){
        result={text:'AI建议下('+saveMove.x+','+saveMove.y+')。理由：己方有棋串仅剩'+myDanger.libs+'口气，随时可能被提。应优先救棋，增加气数或连接友军。你实际落子未处理己方危机，若被对方提子将损失惨重', x:saveMove.x, y:saveMove.y, isOpp:false};
      }
    }
    // 如果玩家在救棋，正确，不给建议
  }

  // 2. 检查对方是否有弱棋可攻(只在己方无危机时)
  if(!result && !myDanger){
    var oppWeak=rpScanGoWeak(oppColor);
    if(oppWeak){
      // 检查玩家实际落子是否已在攻击弱棋附近
      var nearWeak=false;
      for(var dx2=-1;dx2<=1&&!nearWeak;dx2++)for(var dy2=-1;dy2<=1;dy2++){
        var nx2=curX+dx2,ny2=curY+dy2;
        if(nx2>=0&&nx2<GSZ&&ny2>=0&&ny2<GSZ&&goB[nx2][ny2]===oppColor)nearWeak=true;
      }
      if(!nearWeak){
        // 玩家没攻弱棋，建议攻击位置
        var atkMove=rpFindGoAttackMove(oppColor,myColor);
        if(atkMove){
          result={text:'AI建议下('+atkMove.x+','+atkMove.y+')。理由：对方此处棋子仅剩'+oppWeak.libs+'口气，是弱棋。在此紧气可逼迫对方逃孤或被提，掌握攻击主动权。你实际落子未对对方弱棋施压，错失攻击良机', x:atkMove.x, y:atkMove.y, isOpp:false};
        }
      }
    }
  }

  // 3. 如果没有紧急情况，检查围空效率(只在对方无弱棋且己方无危机时)
  if(!result && !myDanger){
    var oppWeak2=rpScanGoWeak(oppColor);
    if(!oppWeak2){
      // 检查玩家落子是否远离主战场
      var nearAny=false;
      for(var dx3=-3;dx3<=3&&!nearAny;dx3++)for(var dy3=-3;dy3<=3;dy3++){
        var nx3=curX+dx3,ny3=curY+dy3;
        if(nx3>=0&&nx3<GSZ&&ny3>=0&&ny3<GSZ&&goB[nx3][ny3]!==0){nearAny=true;break}
      }
      if(!nearAny && phase!=='开局'){
        // 寻找更好的围空点
        var bestExpand=rpFindGoExpandMove(myColor,phase);
        if(bestExpand){
          result={text:'AI建议下('+bestExpand.x+','+bestExpand.y+')。理由：此手远离主战场，周围无棋子配合，效率较低。此处靠近己方棋子可围成实地，配合既有势力扩大地盘', x:bestExpand.x, y:bestExpand.y, isOpp:false};
        }
      }
    }
  }

  // 恢复玩家落子后的棋盘状态
  goB=savedBoard;
  goKo=savedKo;
  goLast={x:curX,y:curY,c:myColor};

  return result;
}
// 扫描围棋己方危险棋串(<=2气)
function rpScanGoDanger(myColor){
  for(var x=0;x<GSZ;x++)for(var y=0;y<GSZ;y++){
    if(goB[x][y]!==myColor)continue;
    var info=rpGoGroupInfo(x,y,myColor);
    if(info.libs<=2 && info.libs>0){
      return {x:x,y:y,libs:info.libs};
    }
  }
  return null;
}
// 在指定棋盘上扫描危险
function rpScanGoDangerOnBoard(board,myColor){
  for(var x=0;x<GSZ;x++)for(var y=0;y<GSZ;y++){
    if(board[x][y]!==myColor)continue;
    var visited={};
    var stack=[[x,y]];
    var libs=0;
    while(stack.length>0){
      var pos=stack.pop();
      var key=pos[0]+','+pos[1];
      if(visited[key])continue;
      visited[key]=1;
      var dirs=[[0,1],[0,-1],[1,0],[-1,0]];
      for(var d=0;d<4;d++){
        var nx=pos[0]+dirs[d][0],ny=pos[1]+dirs[d][1];
        if(nx<0||nx>=GSZ||ny<0||ny>=GSZ)continue;
        if(board[nx][ny]===0)libs++;
        else if(board[nx][ny]===myColor&&!visited[nx+','+ny])stack.push([nx,ny]);
      }
    }
    if(libs<=2 && libs>0)return {x:x,y:y,libs:libs};
  }
  return null;
}
// 获取围棋棋串信息(气数)
function rpGoGroupInfo(x,y,color){
  var visited={};
  var stack=[[x,y]];
  var libs=0;
  while(stack.length>0){
    var pos=stack.pop();
    var key=pos[0]+','+pos[1];
    if(visited[key])continue;
    visited[key]=1;
    var dirs=[[0,1],[0,-1],[1,0],[-1,0]];
    for(var d=0;d<4;d++){
      var nx=pos[0]+dirs[d][0],ny=pos[1]+dirs[d][1];
      if(nx<0||nx>=GSZ||ny<0||ny>=GSZ)continue;
      if(goB[nx][ny]===0)libs++;
      else if(goB[nx][ny]===color&&!visited[nx+','+ny])stack.push([nx,ny]);
    }
  }
  return {libs:libs};
}

      for(var ei=0;ei<allEscape.length;ei++){

        var ec=xqB[em.tr][em.tc];
        xqB[em.tr][em.tc]=ep;xqB[em.fr][em.fc]=0;
        if(!xqCheck(xqB, playerIsRed2))canEscape=true;
        xqB[em.fr][em.fc]=ep;xqB[em.tr][em.tc]=ec;
        if(canEscape)break;
      }
      if(!canEscape){
        // 将死! 不给建议
        suggest=null;
      }else{

        if(bestCapture) suggest=bestCapture;
      }
    }else{
      // 检查对方是否威胁多个大子(无法全部保护)

              if(rval>=400 && !tp2[rm.tr+','+rm.tc]){
                tp2[rm.tr+','+rm.tc]=1;
                remainingThreats++;
              }

          }
          xqB[mm.fr][mm.fc]=mp;xqB[mm.tr][mm.tc]=mc;
          if(remainingThreats===0){canProtectAll=true;break}
        }
        if(!canProtectAll){

          suggest=null;

          }
        }

  return {cmt: cmt, suggest: suggest};
}
// 象棋AI建议: 全面评估局面，防守优先原则
// 核心逻辑:
//   1. 撤销玩家走棋，检查对方在走棋前是否将军或威胁大子
//   2. 如果对方在将军 -> 必须应将，玩家走棋若已应将则正确，不给进攻建议
//   3. 如果对方威胁己方大子(下一手可吃) -> 玩家走棋若在保护/逃跑则正确
//   4. 如果无威胁 -> 检查是否有更好的吃子机会
function rpFindBetterXQMove(playerIsRed, curMove){
  // 保存当前棋盘状态(包含玩家走棋后的状态)
  var savedBoard=[];
  for(var i=0;i<xqB.length;i++)savedBoard.push(xqB[i].slice());

  // 撤销玩家走棋: 把棋子移回原位，恢复被吃的子
  if(curMove){
    var movedPiece=xqB[curMove.tr][curMove.tc];
    xqB[curMove.fr][curMove.fc]=movedPiece;
    xqB[curMove.tr][curMove.tc]=(curMove.captured&&curMove.captured!==0)?curMove.captured:0;
  }

  var result=null;

  // 1. 检查对方是否在将军(玩家走棋前的棋盘上)
  var inCheck=xqCheck(xqB, playerIsRed);
  if(inCheck){
    // 对方在将军！玩家必须应将
    // 检查玩家实际走棋是否化解了将军
    // 恢复棋盘到走棋后状态检查
    xqB=savedBoard.map(function(r){return r.slice()});
    var stillInCheck=xqCheck(xqB, playerIsRed);
    if(!stillInCheck){
      // 玩家成功应将，正确！不给进攻建议
      return null;
    }
    // 玩家没应将(不应该发生，但防御性处理)
    // 找最佳应将方式
    xqB=savedBoard.map(function(r){return r.slice()});
    // 重新撤销走棋
    if(curMove){
      var mp=xqB[curMove.tr][curMove.tc];
      xqB[curMove.fr][curMove.fc]=mp;
      xqB[curMove.tr][curMove.tc]=(curMove.captured&&curMove.captured!==0)?curMove.captured:0;
    }
    var escapeMove=rpFindXQCheckEscape(playerIsRed);
    if(escapeMove){
      result={text:'AI建议走'+escapeMove.desc+'。理由：对方正在将军，必须立即应将化解！你实际走法未能解除将军威胁。此处是最佳应将方式', x:escapeMove.tc, y:escapeMove.tr, isOpp:false, xq:true, fromX:escapeMove.fc, fromY:escapeMove.fr};
    }
    xqB=savedBoard;
    return result;
  }

  // 2. 检查对方是否威胁己方大子(下一手可吃车马炮)
  var threatenedPiece=rpScanXQThreat(playerIsRed);
  if(threatenedPiece){
    // 对方威胁己方大子，检查玩家走棋是否在应对
    // 恢复棋盘检查走棋后威胁是否解除
    xqB=savedBoard.map(function(r){return r.slice()});
    var threatAfter=rpScanXQThreat(playerIsRed);
    if(!threatAfter){
      // 玩家成功保护/移走了受威胁的棋子，正确！
      return null;
    }
    // 玩家没应对威胁，建议保护或逃跑
    xqB=savedBoard.map(function(r){return r.slice()});
    if(curMove){
      var mp2=xqB[curMove.tr][curMove.tc];
      xqB[curMove.fr][curMove.fc]=mp2;
      xqB[curMove.tr][curMove.tc]=(curMove.captured&&curMove.captured!==0)?curMove.captured:0;
    }
    var protectMove=rpFindXQProtectMove(playerIsRed, threatenedPiece);
    if(protectMove){
      result={text:'AI建议走'+protectMove.desc+'。理由：己方'+XC_H[threatenedPiece.piece]+'正受到对方威胁，若不处理下一手将被吃。你实际走法未保护受威胁棋子。应优先移走或保护大子，避免物质损失', x:protectMove.tc, y:protectMove.tr, isOpp:false, xq:true, fromX:protectMove.fc, fromY:protectMove.fr};
    }
    xqB=savedBoard;
    return result;
  }

  // 3. 无威胁，检查是否有更好的吃子机会
  var bestMove=null, bestVal=0;
  var allMoves=xqLegalMoves(xqB,playerIsRed);
  for(var i2=0;i2<allMoves.length;i2++){
    var mv=allMoves[i2];
    if(curMove && mv.fr===curMove.fr && mv.fc===curMove.fc && mv.tr===curMove.tr && mv.tc===curMove.tc)continue;
    if(mv.captured && mv.captured!==0){
      var capVal=XV[mv.captured]||0;
      var piece=xqB[mv.fr][mv.fc];
      var myVal=XV[piece]||0;
      xqB[mv.tr][mv.tc]=piece;xqB[mv.fr][mv.fc]=0;
      var canBeRecaptured=xqCanCapture(xqB,!playerIsRed,mv.tr,mv.tc);
      xqB[mv.fr][mv.fc]=piece;xqB[mv.tr][mv.tc]=mv.captured;
      var netGain=canBeRecaptured?(capVal-myVal):capVal;
      if(netGain>bestVal){
        bestVal=netGain;
        var col='abcdefghi';
        var reason=canBeRecaptured?('净赚'+(capVal-myVal)+'分，但需注意对方可反吃'):(('净赚'+capVal+'分，且不会被反吃，稳赚不赔'));
        bestMove={text:'AI建议走'+XC_H[piece]+'('+col[mv.fc]+(10-mv.fr)+'→'+col[mv.tc]+(10-mv.tr)+')吃对方'+XC_H[mv.captured]+'。理由：'+reason+'。你实际走法未抓住吃子机会，让对方大子逃脱', x:mv.tc, y:mv.tr, isOpp:false, xq:true, fromX:mv.fc, fromY:mv.fr};
      }
    }
  }

  // 恢复棋盘
  xqB=savedBoard;
  return bestMove;
}
// 扫描象棋对方对己方大子的威胁
function rpScanXQThreat(playerIsRed){
  // 检查对方下一步能吃己方哪些大子(车马炮)
  var allOppMoves=xqLegalMoves(xqB,!playerIsRed);
  for(var i=0;i<allOppMoves.length;i++){
    var mv=allOppMoves[i];
    if(mv.captured && mv.captured!==0){
      var val=XV[mv.captured]||0;
      if(val>=400){ // 车(900) 马(400) 炮(450)
        return {piece:mv.captured, x:mv.tc, y:mv.tr};
      }
    }
  }
  return null;
}

// 检查象棋某位置是否可以被对方吃
function xqCanCapture(board, attackerRed, tr, tc){
  var moves=xqLegalMoves(board,attackerRed);
  for(var i=0;i<moves.length;i++){
    if(moves[i].tr===tr&&moves[i].tc===tc)return true;
  }
  return false;
}
function rpApplyMove(idx){
  var m=replayData.moves[idx];
  var goCaptured=0;
  if(replayData.game==='gomoku'){
    gB[m.y][m.x]=m.p;gLast={x:m.x,y:m.y,p:m.p};drawGomoku();
  }else if(replayData.game==='go'){
    var r=goTry(goB,m.x,m.y,m.c,goKo);
    if(r.valid){goB=r.newBoard;goKo=r.newKo;goLast={x:m.x,y:m.y,c:m.c};drawGo();goCaptured=r.captured?r.captured.length:0}
  }else if(replayData.game==='xq'){
    xqB[m.tr][m.tc]=xqB[m.fr][m.fc];xqB[m.fr][m.fc]=0;
    xqSel=[m.tr,m.tc];drawXQ();xqSel=null;
  }
  rpShowComment(idx,goCaptured);
}
function rpRebuildTo(step){
  if(replayData.game==='gomoku'){
    gB=[];for(var i=0;i<GS;i++)gB.push(new Array(GS).fill(0));
    gLast=null;
    for(var i=0;i<step;i++){var m=replayData.moves[i];gB[m.y][m.x]=m.p}
    if(step>0){var lm=replayData.moves[step-1];gLast={x:lm.x,y:lm.y,p:lm.p}}
    drawGomoku();
  }else if(replayData.game==='go'){
    goB=[];for(var i=0;i<GSZ;i++)goB.push(new Array(GSZ).fill(0));
    goLast=null;goKo=null;
    for(var i=0;i<step;i++){var m=replayData.moves[i];var r=goTry(goB,m.x,m.y,m.c,goKo);if(r.valid){goB=r.newBoard;goKo=r.newKo;goLast={x:m.x,y:m.y,c:m.c}}}
    drawGo();
  }else if(replayData.game==='xq'){
    xqB=xqInitBoard();xqSel=null;xqLegal=[];
    for(var i=0;i<step;i++){var m=replayData.moves[i];xqB[m.tr][m.tc]=xqB[m.fr][m.fc];xqB[m.fr][m.fc]=0}
    if(step>0){var lm=replayData.moves[step-1];xqSel=[lm.tr,lm.tc]}
    drawXQ();xqSel=null;
  }
}

// 画棋子球体 — 增强质感：多层渐变+高光+边缘反射
function drawBall(px,py,r,black){
  r=Math.max(2,r);
  cx.save();
  // 投影
  cx.shadowColor='rgba(0,0,0,.4)';cx.shadowBlur=r*.5;cx.shadowOffsetX=r*.1;cx.shadowOffsetY=r*.2;
  // 主体径向渐变

  if(black){
    g.addColorStop(0,'#7a7a7a');g.addColorStop(.1,'#4a4a4a');g.addColorStop(.3,'#2a2a2a');g.addColorStop(.6,'#121212');g.addColorStop(.9,'#080808');g.addColorStop(1,'#020202');
  }else{
    g.addColorStop(0,'#ffffff');g.addColorStop(.15,'#fcf8f0');g.addColorStop(.4,'#f5ede0');g.addColorStop(.7,'#e8dcc8');g.addColorStop(.9,'#d0c0a0');g.addColorStop(1,'#b8a888');
  }
  cx.fillStyle=g;cx.beginPath();cx.arc(px,py,r,0,Math.PI*2);cx.fill();
  cx.restore();
  // 高光层1：大面积柔光
  cx.save();
  var hg=cx.createRadialGradient(px-r*.32,py-r*.32,0,px-r*.32,py-r*.32,r*.65);
  if(black){hg.addColorStop(0,'rgba(255,255,255,.22)');hg.addColorStop(.5,'rgba(255,255,255,.05)');hg.addColorStop(1,'rgba(255,255,255,0)')}
  else{hg.addColorStop(0,'rgba(255,255,255,.85)');hg.addColorStop(.4,'rgba(255,255,255,.3)');hg.addColorStop(1,'rgba(255,255,255,0)')}
  cx.fillStyle=hg;cx.beginPath();cx.arc(px,py,r,0,Math.PI*2);cx.fill();
  cx.restore();
  // 高光层2：锐利小亮点
  cx.save();
  var sg=cx.createRadialGradient(px-r*.3,py-r*.3,0,px-r*.3,py-r*.3,r*.3);
  if(black){sg.addColorStop(0,'rgba(255,255,255,.2)');sg.addColorStop(1,'rgba(255,255,255,0)')}
  else{sg.addColorStop(0,'rgba(255,255,255,.95)');sg.addColorStop(1,'rgba(255,255,255,0)')}
  cx.fillStyle=sg;cx.beginPath();cx.ellipse(px-r*.28,py-r*.28,r*.25,r*.2,-0.3,0,Math.PI*2);cx.fill();
  cx.restore();
  // 底部反射光
  cx.save();cx.globalAlpha=black?.12:.2;
  var bg=cx.createRadialGradient(px+r*.2,py+r*.3,0,px+r*.2,py+r*.3,r*.5);
  if(black){bg.addColorStop(0,'rgba(100,100,100,.5)');bg.addColorStop(1,'rgba(0,0,0,0)')}
  else{bg.addColorStop(0,'rgba(200,180,150,.5)');bg.addColorStop(1,'rgba(255,255,255,0)')}
  cx.fillStyle=bg;cx.beginPath();cx.arc(px,py,r,0,Math.PI*2);cx.fill();

  // 边缘暗纹（增加立体感）
