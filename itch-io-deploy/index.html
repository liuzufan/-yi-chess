<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="description" content="弈·棋道 - 五子棋、围棋、象棋三合一棋类游戏，内置国际顶尖AI算法">
<meta name="author" content="弈">
<meta name="theme-color" content="#f5f0e6">
<title>弈 · 棋道 - Chinese Chess Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#1c1917;--ink-s:#44403c;--ink-l:#78716c;--paper:#f5f0e6;--paper-w:#ebe3d2;--paper-d:#d9cdb4;--accent:#8b5e3c;--accent-s:#a47b5a;--red:#9a4444;--green:#5a7a52;--gold:#c9a84c;--serif:Georgia,'Noto Serif SC','Songti SC','SimSun','宋体',serif;--xqfont:'Noto Serif SC','Songti SC','SimSun','宋体',serif;--r:6px;--rl:14px}
body{background:var(--paper);background-image:radial-gradient(ellipse at 15% 10%,rgba(139,94,60,.05),transparent 60%),radial-gradient(ellipse at 85% 90%,rgba(139,94,60,.04),transparent 55%);min-height:100vh;display:flex;flex-direction:column;align-items:center;font-family:var(--serif);color:var(--ink);user-select:none;-webkit-tap-highlight-color:transparent;padding:16px 12px 40px}
.entry{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:85vh;animation:fi .8s ease}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.entry h1{font-size:3.5rem;font-weight:400;letter-spacing:20px;padding-left:20px}
.entry .sub{font-size:.78rem;letter-spacing:10px;color:var(--ink-l);margin-bottom:36px;padding-left:10px}
.entry .deco{width:140px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin-bottom:44px}
.entry .deco::after{content:'';display:block;width:6px;height:6px;background:var(--accent);border-radius:50%;margin:-3px auto 0}
.cards{display:flex;gap:32px;flex-wrap:wrap;justify-content:center;max-width:960px}
.card{width:240px;height:300px;border:1px solid var(--paper-d);border-radius:var(--rl);background:var(--paper-w);cursor:pointer;transition:all .4s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 24px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center 30%,rgba(139,94,60,.08),transparent 70%);opacity:0;transition:opacity .4s}
.card::after{content:'';position:absolute;bottom:0;left:50%;width:0;height:2px;background:var(--accent);transition:width .4s,left .4s}
.card:hover{transform:translateY(-6px);box-shadow:0 16px 40px rgba(60,40,10,.12);border-color:var(--accent-s)}
.card:hover::before{opacity:1}.card:hover::after{width:60%;left:20%}
.card svg{width:80px;height:80px;margin-bottom:28px;color:var(--accent);opacity:.65;transition:all .4s}
.card:hover svg{opacity:1;transform:scale(1.05)}
.card .name{font-size:1.25rem;letter-spacing:8px;margin-bottom:10px;font-weight:400}
.card .desc{font-size:.72rem;letter-spacing:2px;color:var(--ink-l);text-align:center;line-height:2}
.game{display:none;width:100%;flex-direction:column;align-items:center}.game.active{display:flex}
.nav{display:flex;align-items:center;gap:20px;margin-bottom:18px}
.nav .back{display:flex;align-items:center;gap:5px;cursor:pointer;color:var(--ink-l);font-size:.8rem;letter-spacing:2px;transition:color .2s}
.nav .back:hover{color:var(--accent)}.nav .back svg{width:14px;height:14px}
.nav .title{font-size:1.15rem;letter-spacing:8px;font-weight:400}
.nav .ln{width:30px;height:1px;background:var(--accent);opacity:.3}
.bar{display:flex;gap:10px;margin-bottom:8px;font-size:.8rem;align-items:center;flex-wrap:wrap;justify-content:center}
.bar .it{display:flex;align-items:center;gap:7px;padding:5px 14px;border:1px solid var(--paper-d);border-radius:20px;background:var(--paper-w);color:var(--ink-s)}
.si{width:14px;height:14px;border-radius:50%;display:inline-block;flex-shrink:0}
.sb{background:radial-gradient(circle at 35% 35%,#4a4a4a,#1a1a1a);box-shadow:0 1px 2px rgba(0,0,0,.2)}
.sw{background:radial-gradient(circle at 35% 35%,#fff,#d4d4d4);box-shadow:0 1px 2px rgba(0,0,0,.1);border:.5px solid #bbb}
#st{font-weight:600;color:var(--accent);min-width:100px;text-align:center;font-size:.82rem;letter-spacing:1px;transition:color .3s}
.diff-sel{display:flex;gap:6px;margin-bottom:8px;justify-content:center;flex-wrap:wrap}
.diff-sel .diff{padding:4px 14px;font-size:.72rem;border:1px solid var(--paper-d);border-radius:16px;cursor:pointer;color:var(--ink-l);transition:all .2s;letter-spacing:1px}
.diff-sel .diff:hover{border-color:var(--accent-s);color:var(--ink-s)}
.diff-sel .diff.active{background:var(--accent);color:var(--paper);border-color:var(--accent)}
#wrap{position:relative;border-radius:var(--rl);overflow:hidden;box-shadow:0 2px 8px rgba(60,40,10,.1),0 8px 24px rgba(60,40,10,.06),0 0 0 1px rgba(107,82,48,.12);max-width:95vw}
canvas{display:block;cursor:default;touch-action:none}
.ctl{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;justify-content:center}
button{padding:7px 18px;font-size:.8rem;font-family:var(--serif);border:1px solid var(--paper-d);border-radius:var(--r);cursor:pointer;transition:all .2s;font-weight:400;letter-spacing:1px;background:var(--paper-w);color:var(--ink-s);display:inline-flex;align-items:center;gap:5px}
button:hover{background:var(--paper-d);transform:translateY(-1px)}
button:active{transform:translateY(0)}
button svg{width:13px;height:13px;opacity:.7}
button:disabled{opacity:.4;cursor:not-allowed;transform:none}
#rbtn{background:var(--ink);color:var(--paper);border-color:var(--ink)}#rbtn:hover{background:var(--ink-s)}
#ov{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(28,25,23,.82);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s;border-radius:var(--rl)}
#ov.show{opacity:1;pointer-events:all}
#ov h2{font-size:2rem;margin-bottom:8px;font-weight:400;letter-spacing:12px;padding-left:12px}
#ov h2.win{color:#d4a85a}#ov h2.lose{color:#c47878}#ov h2.draw{color:#999}
#ov p{font-size:.82rem;color:#bbb;margin-bottom:18px;letter-spacing:1px}
#obtn{background:var(--paper);color:var(--ink);border:none;padding:9px 28px;font-size:.8rem;letter-spacing:2px}
.ft{margin-top:14px;font-size:.68rem;color:var(--ink-l);opacity:.4;text-align:center;letter-spacing:2px}
#xm{display:none;max-width:560px;width:95vw;margin-top:8px;font-size:.75rem;color:var(--ink-l);max-height:100px;overflow-y:auto;background:var(--paper-w);border:1px solid var(--paper-d);border-radius:var(--r);padding:8px 12px;line-height:1.8}
#xm.show{display:block}
#aiinfo{display:none;max-width:560px;width:95vw;margin-top:6px;font-size:.7rem;color:var(--ink-l);max-height:60px;overflow-y:auto;background:var(--paper-w);border:1px solid var(--paper-d);border-radius:var(--r);padding:6px 12px;line-height:1.7;letter-spacing:.5px}
#aiinfo.show{display:block}
#aiinfo .tag{color:var(--accent);font-weight:600}
.thinking-dot{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--red);margin:0 2px;animation:td 1.4s infinite ease-in-out both}
.thinking-dot:nth-child(2){animation-delay:.2s}
.thinking-dot:nth-child(3){animation-delay:.4s}
@keyframes td{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
/* 先手选择 */
.turn-sel{display:flex;gap:6px;margin-bottom:8px;justify-content:center;flex-wrap:wrap}
.turn-opt{padding:4px 14px;font-size:.72rem;border:1px solid var(--paper-d);border-radius:16px;cursor:pointer;color:var(--ink-l);transition:all .2s;letter-spacing:1px}
.turn-opt:hover{border-color:var(--accent-s);color:var(--ink-s)}
.turn-opt.active{background:var(--accent);color:var(--paper);border-color:var(--accent)}
/* 胜率条 */
.wr-bar{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:.72rem;max-width:560px;width:95vw}
.wr-label{color:var(--ink-l);letter-spacing:1px;white-space:nowrap}
.wr-track{flex:1;height:8px;background:var(--paper-d);border-radius:4px;overflow:hidden;position:relative}
.wr-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold),var(--red));border-radius:4px;transition:width .5s ease}
.wr-track::after{content:'';position:absolute;top:0;left:50%;width:1px;height:100%;background:rgba(28,25,23,.2)}
.wr-pct{color:var(--ink-s);font-weight:600;min-width:38px;text-align:right}
/* 回放模态框 */
.rp-modal{display:none;position:fixed;inset:0;background:rgba(28,25,23,.85);z-index:100;align-items:center;justify-content:center;flex-direction:column;opacity:0;transition:opacity .3s}
.rp-modal.show{display:flex;opacity:1}
.rp-box{background:var(--paper);border-radius:var(--rl);padding:24px 32px;max-width:520px;width:90vw;max-height:80vh;overflow-y:auto}
.rp-box h3{font-size:1.1rem;letter-spacing:6px;margin-bottom:16px;text-align:center;font-weight:400}
.rp-list{display:flex;flex-direction:column;gap:8px}
.rp-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--paper-w);border:1px solid var(--paper-d);border-radius:var(--r);cursor:pointer;transition:all .2s}
.rp-item:hover{border-color:var(--accent-s);transform:translateX(4px)}
.rp-item .rp-info{font-size:.78rem;color:var(--ink-s)}
.rp-item .rp-result{font-size:.72rem;padding:2px 10px;border-radius:12px}
.rp-item .rp-result.win{background:rgba(90,122,82,.15);color:var(--green)}
.rp-item .rp-result.lose{background:rgba(154,68,68,.15);color:var(--red)}
.rp-item .rp-result.draw{background:rgba(120,113,108,.15);color:var(--ink-l)}
.rp-item .rp-del{font-size:.7rem;color:var(--ink-l);opacity:.5;cursor:pointer;padding:2px 6px}
.rp-item .rp-del:hover{opacity:1;color:var(--red)}
.rp-empty{text-align:center;color:var(--ink-l);font-size:.8rem;padding:20px}
.rp-close{margin-top:16px;width:100%;padding:8px;font-size:.8rem;background:var(--ink);color:var(--paper);border:none;border-radius:var(--r);cursor:pointer}
/* 回放查看器 */
.rp-viewer{display:none;position:fixed;inset:0;background:rgba(28,25,23,.92);z-index:101;align-items:center;justify-content:center;flex-direction:column;opacity:0;transition:opacity .3s}
.rp-viewer.show{display:flex;opacity:1}
.rp-vbox{background:var(--paper);border-radius:var(--rl);padding:20px;display:flex;flex-direction:column;align-items:center;gap:12px}
.rp-vtitle{font-size:.9rem;letter-spacing:3px;color:var(--ink-s)}
.rp-vinfo{font-size:.72rem;color:var(--ink-l)}
.rp-vctl{display:flex;gap:8px;align-items:center}
.rp-vctl button{padding:6px 16px}
.rp-vstep{font-size:.75rem;color:var(--ink-s);min-width:60px;text-align:center}
@media(max-width:640px){.entry h1{font-size:2.2rem;letter-spacing:12px;padding-left:12px}.card{width:170px;height:230px;padding:24px 16px}.card svg{width:56px;height:56px}.card .name{font-size:1rem;letter-spacing:5px}canvas{width:92vw!important;height:92vw!important}button{padding:6px 14px;font-size:.75rem}.nav .title{font-size:1rem;letter-spacing:5px}}
</style>
</head>
<body>

<div class="entry" id="entry">
<h1>弈</h1>
<div class="sub">棋 道</div>
<div class="deco"></div>
<div class="cards">
<div class="card" onclick="enter('gomoku')">
<svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="1"><rect x="8" y="8" width="64" height="64" rx="2"/><line x1="8" y1="24" x2="72" y2="24"/><line x1="8" y1="40" x2="72" y2="40"/><line x1="8" y1="56" x2="72" y2="56"/><line x1="24" y1="8" x2="24" y2="72"/><line x1="40" y1="8" x2="40" y2="72"/><line x1="56" y1="8" x2="56" y2="72"/><circle cx="24" cy="24" r="5.5" fill="currentColor" opacity=".35"/><circle cx="56" cy="56" r="5.5" fill="none" stroke="currentColor" stroke-width="1.3"/></svg>
<div class="name">五子棋</div><div class="desc">连五为胜<br>攻守兼备</div></div>
<div class="card" onclick="enter('go')">
<svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="1"><rect x="6" y="6" width="68" height="68" rx="2"/><line x1="6" y1="23" x2="74" y2="23"/><line x1="6" y1="40" x2="74" y2="40"/><line x1="6" y1="57" x2="74" y2="57"/><line x1="23" y1="6" x2="23" y2="74"/><line x1="40" y1="6" x2="40" y2="74"/><line x1="57" y1="6" x2="57" y2="74"/><circle cx="23" cy="23" r="3" fill="currentColor" opacity=".5"/><circle cx="57" cy="57" r="3" fill="currentColor" opacity=".5"/><circle cx="40" cy="40" r="6" fill="currentColor" opacity=".2"/><circle cx="57" cy="23" r="6" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
<div class="name">围棋</div><div class="desc">黑白交错<br>围地争雄</div></div>
<div class="card" onclick="enter('xq')">
<svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="1"><rect x="8" y="6" width="64" height="68" rx="2"/><line x1="8" y1="22" x2="72" y2="22"/><line x1="8" y1="58" x2="72" y2="58"/><line x1="22" y1="6" x2="22" y2="22"/><line x1="58" y1="6" x2="58" y2="22"/><line x1="22" y1="58" x2="22" y2="74"/><line x1="58" y1="58" x2="58" y2="74"/><path d="M22 22 L58 58 M58 22 L22 58" stroke-dasharray="2 3" opacity=".35"/><circle cx="40" cy="14" r="4" fill="none"/><circle cx="40" cy="66" r="4" fill="currentColor" opacity=".3"/></svg>
<div class="name">象棋</div><div class="desc">楚河汉界<br>运筹帷幄</div></div>
</div></div>

<div class="game" id="game">
<div class="nav">
<div class="back" onclick="exit()"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M10 3 L5 8 L10 13"/></svg>返回</div>
<div class="ln"></div><div class="title" id="ntitle">五子棋</div><div class="ln"></div>
</div>
<div class="diff-sel" id="diffsel">
<div class="diff" data-d="1" onclick="setDiff(1)">入门</div>
<div class="diff active" data-d="2" onclick="setDiff(2)">进阶</div>
<div class="diff" data-d="3" onclick="setDiff(3)">高手</div>
<div class="diff" data-d="4" onclick="setDiff(4)">大师</div>
</div>
<div class="turn-sel" id="turnsel">
<div class="turn-opt active" data-t="1" onclick="setTurn(1)">玩家先手</div>
<div class="turn-opt" data-t="0" onclick="setTurn(0)">电脑先手</div>
</div>
<div class="bar">
<div class="it"><span class="si sb"></span><span id="p1">你</span></div>
<div id="st">你的回合</div>
<div class="it"><span class="si sw"></span><span id="p2">电脑</span></div>
</div>
<div class="wr-bar" id="wrbar" style="display:none">
<div class="wr-label">胜率</div>
<div class="wr-track"><div class="wr-fill" id="wrfill" style="width:50%"></div></div>
<div class="wr-pct" id="wrpct">50%</div>
</div>
<div id="wrap"><canvas id="bd"></canvas>
<div id="ov"><h2 id="ot"></h2><p id="otx"></p><button id="obtn">再来一局</button></div></div>
<div class="ctl">
<button id="ubtn"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M3 6 H10 A3 3 0 0 1 13 9 A3 3 0 0 1 10 12 H5"/><path d="M5 4 L3 6 L5 8"/></svg>悔棋</button>
<button id="rbtn"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M4 8 A4 4 0 1 1 8 12"/><path d="M6 6 L4 8 L2 6"/></svg>重开</button>
<button id="gpbtn" style="display:none">停一手</button>
<button id="grbtn" style="display:none">认输</button>
<button id="gsbtn" style="display:none">数目</button>
<button id="xrbtn" style="display:none">认输</button>
<button id="svbtn">保存棋局</button>
<button id="rpbtn">棋谱回放</button>
</div>
<div id="aiinfo"></div>
<div id="xm"></div>
<div class="ft" id="ft">黑先 · 连五为胜</div>
</div>

<script>
// ============================================================
//  通用工具与全局状态
// ============================================================
var cv, cx, curGame = 'gomoku', over = false, curDiff = 2;
var playerFirst = true; // 玩家先手
var replayMode = false, replayData = null, replayStep = 0, replayTimer = null;
var stats = (function(){try{return JSON.parse(localStorage.getItem('gmk_s')||'')}catch(e){}}())||{w:0,l:0,d:0};
function saveS(){try{localStorage.setItem('gmk_s',JSON.stringify(stats))}catch(e){}}
function addS(r){if(r==='w')stats.w++;else if(r==='l')stats.l++;else stats.d++;saveS()}

function $(id){return document.getElementById(id)}
function showOver(t,tx,cls){over=true;var o=$('ov');$('ot').textContent=t;$('ot').className=cls;$('otx').textContent=tx;o.classList.add('show')}
function hideOver(){over=false;$('ov').classList.remove('show')}
function setDiff(d){
  curDiff=d;
  var ds=document.querySelectorAll('.diff');
  for(var i=0;i<ds.length;i++)ds[i].className='diff'+(parseInt(ds[i].getAttribute('data-d'))===d?' active':'');
}
function showAIInfo(html){
  var el=$('aiinfo');
  if(html){el.innerHTML=html;el.className='show'}
  else el.className='';
}
function setTurn(t){
  playerFirst = t===1;
  var ts=document.querySelectorAll('.turn-opt');
  for(var i=0;i<ts.length;i++)ts[i].className='turn-opt'+(parseInt(ts[i].getAttribute('data-t'))===t?' active':'');
}
function showWinRate(pct){
  var bar=$('wrbar');
  if(pct===null){bar.style.display='none';return}
  bar.style.display='flex';
  pct=Math.max(0,Math.min(100,Math.round(pct)));
  $('wrfill').style.width=pct+'%';
  $('wrpct').textContent=pct+'%';
}
// 胜率计算: 将评估分数转为百分比
function scoreToWinRate(score){
  // 使用sigmoid函数, score范围约 -1000000 ~ 1000000
  var k=1/100000;
  var pct=1/(1+Math.exp(-score*k))*100;
  return pct;
}
// 获取回放列表
function getReplays(){
  try{return JSON.parse(localStorage.getItem('gmk_replays')||'[]')}catch(e){return[]}
}
function saveReplays(arr){
  try{localStorage.setItem('gmk_replays',JSON.stringify(arr))}catch(e){}
}
// 保存当前棋局
function saveCurrentGame(){
  var gameType=curGame;
  var moves=[];
  var result='';
  if(over){
    // 判断结果
    var ot=$('ot').className;
    if(ot==='win')result='win';
    else if(ot==='lose')result='lose';
    else result='draw';
  }else{
    result='unfinished';
  }
  if(gameType==='gomoku'){
    moves=gH.map(function(m){return{x:m.x,y:m.y,p:m.p}});
  }else if(gameType==='go'){
    moves=goHist.map(function(m){return{x:m.x,y:m.y,c:m.c,cap:m.cap||[]}});
  }else if(gameType==='xq'){
    moves=xqHist.map(function(m){return{fr:m.fr,fc:m.fc,tr:m.tr,tc:m.tc,piece:m.piece,captured:m.captured}});
  }
  if(moves.length===0){alert('空棋局无法保存');return}
  var replays=getReplays();
  var now=new Date();
  var dateStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var names={gomoku:'五子棋',go:'围棋',xq:'象棋'};
  replays.unshift({id:Date.now(),game:gameType,name:names[gameType],date:dateStr,result:result,moves:moves,diff:curDiff,playerFirst:playerFirst});
  if(replays.length>50)replays=replays.slice(0,50); // 最多保存50局
  saveReplays(replays);
  alert('棋局已保存！\n'+names[gameType]+' · '+dateStr+' · '+moves.length+'手');
}
// 打开回放列表
function openRPModal(){
  var replays=getReplays();
  var list=$('rplist');
  if(replays.length===0){
    list.innerHTML='<div class="rp-empty">暂无保存的棋局</div>';
  }else{
    var resultText={win:'胜',lose:'负',draw:'平',unfinished:'未完'};
    var html='';
    for(var i=0;i<replays.length;i++){
      var r=replays[i];
      var cls=r.result==='win'?'win':r.result==='lose'?'lose':'draw';

function rpUpdateStep(){
  var total=replayData?replayData.moves.length:0;
  $('rpvstep').textContent=replayStep+'/'+total;
}
function rpStep(dir){
  if(!replayData)return;
  var total=replayData.moves.length;
  if(dir===0){
    // 自动播放
    if(replayTimer){
      clearInterval(replayTimer);replayTimer=null;
      $('rpplaybtn').textContent='▶ 自动';
      return;
    }
    if(replayStep>=total)replayStep=0;
    replayTimer=setInterval(function(){
      if(replayStep>=total){clearInterval(replayTimer);replayTimer=null;$('rpplaybtn').textContent='▶ 自动';return}
      rpApplyMove(replayStep);
      replayStep++;
      rpUpdateStep();
    },800);
    $('rpplaybtn').textContent='⏸ 暂停';
    return;
  }
  if(replayTimer){clearInterval(replayTimer);replayTimer=null;$('rpplaybtn').textContent='▶ 自动'}
  if(dir>0&&replayStep<total){
    rpApplyMove(replayStep);replayStep++;rpUpdateStep();
  }else if(dir<0&&replayStep>0){
    replayStep--;rpRebuildTo(replayStep);rpUpdateStep();
  }
}
function rpApplyMove(idx){
  var m=replayData.moves[idx];
  if(replayData.game==='gomoku'){
    gB[m.y][m.x]=m.p;gLast={x:m.x,y:m.y,p:m.p};drawGomoku();
  }else if(replayData.game==='go'){
    var r=goTry(goB,m.x,m.y,m.c,goKo);
    if(r.valid){goB=r.newBoard;goKo=r.newKo;goLast={x:m.x,y:m.y,c:m.c};drawGo()}
  }else if(replayData.game==='xq'){
    xqB[m.tr][m.tc]=xqB[m.fr][m.fc];xqB[m.fr][m.fc]=0;
    xqSel=[m.tr,m.tc];drawXQ();xqSel=null;
  }
}
function rpRebuildTo(step){
  if(replayData.game==='gomoku'){
    gB=[];for(var i=0;i<GS;i++)gB.push(new Array(GS).fill(0));
    gLast=null;
    for(var i=0;i<step;i++){var m=replayData.moves[i];gB[m.y][m.x]=m.p}
    if(step>0){var lm=replayData.moves[step-1];gLast={x:lm.x,y:lm.y,p:lm.p}}
    drawGomoku();
  }else if(replayData.game==='go'){
    goB=[];for(var i=0;i<GSZ;i++)goB.push(new Array(GSZ).fill(0));
    goLast=null;goKo=null;
    for(var i=0;i<step;i++){var m=replayData.moves[i];var r=goTry(goB,m.x,m.y,m.c,goKo);if(r.valid){goB=r.newBoard;goKo=r.newKo;goLast={x:m.x,y:m.y,c:m.c}}}
    drawGo();
  }else if(replayData.game==='xq'){
    xqB=xqInitBoard();xqSel=null;xqLegal=[];
    for(var i=0;i<step;i++){var m=replayData.moves[i];xqB[m.tr][m.tc]=xqB[m.fr][m.fc];xqB[m.fr][m.fc]=0}
    if(step>0){var lm=replayData.moves[step-1];xqSel=[lm.tr,lm.tc]}
    drawXQ();xqSel=null;
  }
}

// 画棋子球体 — 增强质感：多层渐变+高光+边缘反射
function drawBall(px,py,r,black){
  r=Math.max(2,r);
  cx.save();
  // 投影
  cx.shadowColor='rgba(0,0,0,.4)';cx.shadowBlur=r*.5;cx.shadowOffsetX=r*.1;cx.shadowOffsetY=r*.2;
  // 主体径向渐变
  var g=cx.createRadialGradient(px-r*.4,py-r*.4,r*.03,px+r*.15,py+r*.15,r*1.15);
  if(black){
    g.addColorStop(0,'#7a7a7a');g.addColorStop(.1,'#4a4a4a');g.addColorStop(.3,'#2a2a2a');g.addColorStop(.6,'#121212');g.addColorStop(.9,'#080808');g.addColorStop(1,'#020202');
  }else{
    g.addColorStop(0,'#ffffff');g.addColorStop(.15,'#fcf8f0');g.addColorStop(.4,'#f5ede0');g.addColorStop(.7,'#e8dcc8');g.addColorStop(.9,'#d0c0a0');g.addColorStop(1,'#b8a888');
  }
  cx.fillStyle=g;cx.beginPath();cx.arc(px,py,r,0,Math.PI*2);cx.fill();
  cx.restore();
  // 高光层1：大面积柔光
  cx.save();
  var hg=cx.createRadialGradient(px-r*.32,py-r*.32,0,px-r*.32,py-r*.32,r*.65);
  if(black){hg.addColorStop(0,'rgba(255,255,255,.22)');hg.addColorStop(.5,'rgba(255,255,255,.05)');hg.addColorStop(1,'rgba(255,255,255,0)')}
  else{hg.addColorStop(0,'rgba(255,255,255,.85)');hg.addColorStop(.4,'rgba(255,255,255,.3)');hg.addColorStop(1,'rgba(255,255,255,0)')}
  cx.fillStyle=hg;cx.beginPath();cx.arc(px,py,r,0,Math.PI*2);cx.fill();
  cx.restore();
  // 高光层2：锐利小亮点
  cx.save();
  var sg=cx.createRadialGradient(px-r*.3,py-r*.3,0,px-r*.3,py-r*.3,r*.3);
  if(black){sg.addColorStop(0,'rgba(255,255,255,.2)');sg.addColorStop(1,'rgba(255,255,255,0)')}
  else{sg.addColorStop(0,'rgba(255,255,255,.95)');sg.addColorStop(1,'rgba(255,255,255,0)')}
  cx.fillStyle=sg;cx.beginPath();cx.ellipse(px-r*.28,py-r*.28,r*.25,r*.2,-0.3,0,Math.PI*2);cx.fill();
  cx.restore();
  // 底部反射光
  cx.save();cx.globalAlpha=black?.12:.2;
  var bg=cx.createRadialGradient(px+r*.2,py+r*.3,0,px+r*.2,py+r*.3,r*.5);
  if(black){bg.addColorStop(0,'rgba(100,100,100,.5)');bg.addColorStop(1,'rgba(0,0,0,0)')}
  else{bg.addColorStop(0,'rgba(200,180,150,.5)');bg.addColorStop(1,'rgba(255,255,255,0)')}
  cx.fillStyle=bg;cx.beginPath();cx.arc(px,py,r,0,Math.PI*2);cx.fill();
  cx.restore();
  // 边缘暗纹（增加立体感）
  cx.save();cx.globalAlpha=black?.4:.2;
  cx.strokeStyle=black?'#000':'#a89878';cx.lineWidth=1;
  cx.beginPath();cx.arc(px,py,r-.5,0,Math.PI*2);cx.stroke();
  cx.restore();
}
// 木纹纹理缓存（离屏Canvas，避免每次重绘时Math.random导致纹理跳动）
var _paperCache={};
function makeWoodTexture(w,h,seed){
  var key=w+'_'+h;
  if(_paperCache[key])return _paperCache[key];
  var oc=document.createElement('canvas');oc.width=w;oc.height=h;
  var ox=oc.getContext('2d');
  // 使用种子伪随机，保证纹理固定
  var s=seed||12345;
  function rng(){s=(s*9301+49297)%233280;return s/233280}
  // 底色渐变
  var g=ox.createRadialGradient(w/2,h/2,0,w/2,h/2,w*.72);
  g.addColorStop(0,'#e8cc94');g.addColorStop(.35,'#dab87a');g.addColorStop(.7,'#c8a460');g.addColorStop(1,'#a8843c');
  ox.fillStyle=g;ox.fillRect(0,0,w,h);
  // 木纹层1：粗木纹波纹
  ox.save();ox.globalAlpha=.14;
  for(var i=0;i<35;i++){
    ox.strokeStyle=i%2===0?'#8b5e3c':'#6b4226';ox.lineWidth=.5+rng()*1.2;
    ox.beginPath();var y=(i/35)*h+rng()*8;
    ox.moveTo(0,y);ox.bezierCurveTo(w*.25,y+(rng()-.5)*20,w*.5,y+(rng()-.5)*20,w*.75,y+(rng()-.5)*15);
    ox.bezierCurveTo(w*.85,y+(rng()-.5)*12,w*.95,y+(rng()-.5)*8,w,y+(rng()-.5)*5);
    ox.stroke();
  }
  ox.restore();
  // 木纹层2：深色细纹
  ox.save();ox.globalAlpha=.08;
  for(var i=0;i<20;i++){
    ox.strokeStyle='#5a3a1a';ox.lineWidth=.3+rng()*.4;
    ox.beginPath();var y=rng()*h;
    ox.moveTo(0,y);ox.bezierCurveTo(w*.3,y+(rng()-.5)*12,w*.6,y+(rng()-.5)*12,w,y+(rng()-.5)*8);
    ox.stroke();
  }
  ox.restore();
  // 木纹层3：颗粒
  ox.save();ox.globalAlpha=.06;
  for(var i=0;i<120;i++){ox.fillStyle=i%3===0?'#8b6914':'#6b4f10';ox.fillRect(rng()*w,rng()*h,rng()*2+.3,rng()*2+.3)}
  ox.restore();
  // 四角暗角
  ox.save();ox.globalAlpha=.15;
  var vg=ox.createRadialGradient(w/2,h/2,w*.25,w/2,h/2,w*.7);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(50,30,5,.7)');
  ox.fillStyle=vg;ox.fillRect(0,0,w,h);
  ox.restore();
  _paperCache[key]=oc;
  return oc;
}
function drawPaper(w,h){
  var tex=makeWoodTexture(w,h);
  cx.drawImage(tex,0,0);
}

  var hx=-1,hy=-1;

      var x=Math.round((p.mx-GP)/GC),y=Math.round((p.my-GP)/GC);

      }
    }else if(curGame==='go'&&!goOver&&!goAi&&goCur===playerColor){
      var gx=Math.round((p.mx-GOP)/GOC),gy=Math.round((p.my-GOP)/GOC);
      if(gx>=0&&gx<GSZ&&gy>=0&&gy<GSZ&&goB[gx][gy]===0){if(!goH||goH.x!==gx||goH.y!==gy){goH={x:gx,y:gy};drawGo()}}
    }
  });
  c.addEventListener('mouseleave',function(){hx=-1;hy=-1;if(curGame==='gomoku'&&!over)drawGomoku();if(curGame==='go'){goH=null;drawGo()}});
}

// ============================================================
//  五子棋 (15x15) — VCF/VCT + 威胁搜索 + 迭代加深Alpha-Beta
//  棋型评估: 七大棋型含跳子模式, 26种开局定式
// ============================================================
var GS=15,GC=36,GP=28,GR=15,GX=GC*(GS-1)+GP*2;
var gB,gH,gCur,gAiThink,gLast,gTT,gNodes,gStart,gAbort,gTTSize=200003,gKiller,gHistory;

// 棋型评分表
var PAT_SCORE={
  FIVE:10000000,     // 连五
  LIVE_FOUR:1000000, // 活四
  RUSH_FOUR:100000,  // 冲四(含跳冲四)
  LIVE_THREE:10000,  // 活三(含跳活三)
  SLEEP_THREE:1000,  // 眠三
  LIVE_TWO:100,      // 活二(含跳活二)
  SLEEP_TWO:10,      // 眠二
  LIVE_ONE:1,        // 活一
  SLEEP_ONE:0        // 眠一
};

// 提取一条线上的棋型编码 (以p为放置点, 方向dx,dy)
// 返回: 以落子点为中心,前后各取4格的编码字符串
// 编码: 1=己方, 2=对方, 0=空, 边界视为对方
function gLineStr(b,x,y,p,dx,dy){
  var s='';
  for(var i=-4;i<=4;i++){
    var nx=x+dx*i,ny=y+dy*i;
    if(i===0){s+='1';continue}
    if(nx<0||nx>=GS||ny<0||ny>=GS){s+='2';continue}
    var v=b[ny][nx];
    if(v===0)s+='0';
    else if(v===p)s+='1';
    else s+='2';
  }
  return s;
}

// 检测中心点(位置4)的棋型
function gPattern(s){
  // s长度9, 中心为s[4]='1'
  // 检查各种棋型
  // 连五
  if(s.indexOf('11111')>=0)return'FIVE';
  // 活四: 011110
  if(s.indexOf('011110')>=0)return'LIVE_FOUR';
  // 冲四: 011112, 211110, 11110(边), 01111(边), 11011, 10111, 11101
  if(/[2]11110/.test(s)||/01111[2]/.test(s))return'RUSH_FOUR';
  if(s.indexOf('11011')>=0||s.indexOf('11101')>=0||s.indexOf('10111')>=0)return'RUSH_FOUR';
  if(/^[2]1111/.test(s)||/1111[2]$/.test(s))return'RUSH_FOUR';
  // 活三: 011100, 001110, 010110, 011010
  if(s.indexOf('011100')>=0||s.indexOf('001110')>=0)return'LIVE_THREE';
  if(s.indexOf('010110')>=0||s.indexOf('011010')>=0)return'LIVE_THREE';
  // 眠三: 001112, 010112, 011012, 211100, 211010, 210110, 10011, 11001, 10101
  if(/[2]11100/.test(s)||/00111[2]/.test(s))return'SLEEP_THREE';
  if(/[2]10110/.test(s)||/01101[2]/.test(s))return'SLEEP_THREE';
  if(/[2]11010/.test(s)||/01011[2]/.test(s))return'SLEEP_THREE';
  if(s.indexOf('10011')>=0||s.indexOf('11001')>=0||s.indexOf('10101')>=0)return'SLEEP_THREE';
  if(/^[2]1110/.test(s)||/0111[2]$/.test(s))return'SLEEP_THREE';
  // 活二: 001100, 010100, 001010, 010010
  if(s.indexOf('001100')>=0||s.indexOf('010100')>=0)return'LIVE_TWO';
  if(s.indexOf('001010')>=0||s.indexOf('010010')>=0)return'LIVE_TWO';
  // 眠二: 001102, 010012, 201100, 210100, 10001
  if(/[2]01100/.test(s)||/00110[2]/.test(s))return'SLEEP_TWO';
  if(/[2]10100/.test(s)||/00101[2]/.test(s))return'SLEEP_TWO';
  if(s.indexOf('10001')>=0)return'SLEEP_TWO';
  // 活一
  if(s.indexOf('00100')>=0||s.indexOf('01000')>=0||s.indexOf('00010')>=0)return'LIVE_ONE';
  return null;
}

// 评估一个点在4个方向上的棋型总分
function gEvalPt(b,x,y,p){
  var D=[[1,0],[0,1],[1,1],[1,-1]];
  var total=0;
  var patterns={FIVE:0,LIVE_FOUR:0,RUSH_FOUR:0,LIVE_THREE:0,SLEEP_THREE:0,LIVE_TWO:0,SLEEP_TWO:0,LIVE_ONE:0};
  for(var d=0;d<4;d++){
    var s=gLineStr(b,x,y,p,D[d][0],D[d][1]);
    var pat=gPattern(s);
    if(pat){patterns[pat]++;total+=PAT_SCORE[pat]}
  }
  // 组合威胁加成
  if(patterns.FIVE>0)return PAT_SCORE.FIVE;
  if(patterns.LIVE_FOUR>0||patterns.RUSH_FOUR>=2)return PAT_SCORE.LIVE_FOUR;
  if(patterns.RUSH_FOUR>0&&patterns.LIVE_THREE>0)return PAT_SCORE.RUSH_FOUR;
  if(patterns.LIVE_THREE>=2)return PAT_SCORE.LIVE_THREE*2;
  return total;
}

// 获取棋型统计(用于决策)
function gPatCount(b,x,y,p){
  var D=[[1,0],[0,1],[1,1],[1,-1]];
  var pc={FIVE:0,LIVE_FOUR:0,RUSH_FOUR:0,LIVE_THREE:0,SLEEP_THREE:0,LIVE_TWO:0,SLEEP_TWO:0};
  for(var d=0;d<4;d++){
    var s=gLineStr(b,x,y,p,D[d][0],D[d][1]);
    var pat=gPattern(s);
    if(pat&&pc[pat]!==undefined)pc[pat]++;
  }
  return pc;
}

// 候选位置生成
function gCands(b,range){
  range=range||2;var s=new Set();
  for(var y=0;y<GS;y++)for(var x=0;x<GS;x++)if(b[y][x]!==0)
    for(var dy=-range;dy<=range;dy++)for(var dx=-range;dx<=range;dx++){var nx=x+dx,ny=y+dy;if(nx>=0&&nx<GS&&ny>=0&&ny<GS&&b[ny][nx]===0)s.add(ny*GS+nx)}
  if(s.size===0)s.add(7*GS+7);
  var arr=[];s.forEach(function(v){arr.push({x:v%GS,y:Math.floor(v/GS)})});
  return arr;
}

// 检查胜利
function gCheckWin(b,x,y,p){
  var D=[[1,0],[0,1],[1,1],[1,-1]];
  for(var d=0;d<4;d++){
    var c=1;
    for(var i=1;i<5;i++){var nx=x+D[d][0]*i,ny=y+D[d][1]*i;if(nx<0||nx>=GS||ny<0||ny>=GS||b[ny][nx]!==p)break;c++}
    for(var i=1;i<5;i++){var nx=x-D[d][0]*i,ny=y-D[d][1]*i;if(nx<0||nx>=GS||ny<0||ny>=GS||b[ny][nx]!==p)break;c++}
    if(c>=5)return true;
  }
  return false;
}

// Zobrist哈希
var gZob=new Array(GS*GS*2);
for(var i=0;i<gZob.length;i++)gZob[i]=Math.random()*0xFFFFFFFF;
function gHash(b){
  var h=0;
  for(var y=0;y<GS;y++)for(var x=0;x<GS;x++){
    if(b[y][x]===1)h^=gZob[(y*GS+x)*2];
    else if(b[y][x]===2)h^=gZob[(y*GS+x)*2+1];
  }
  return h>>>0;
}

// VCF搜索 (连续冲四搜索)
function gVCF(b,attacker,depth,koHash){
  if(depth<=0||gAbort)return null;
  var cs=gCands(b,1);
  // 按威胁值排序
  cs.sort(function(a,c){return gEvalPt(b,c.x,c.y,attacker)-gEvalPt(b,a.x,a.y,attacker)});
  for(var i=0;i<cs.length;i++){
    var x=cs[i].x,y=cs[i].y;
    var pc=gPatCount(b,x,y,attacker);
    // 只考虑能形成冲四或以上的着法
    if(pc.RUSH_FOUR===0&&pc.LIVE_FOUR===0&&pc.FIVE===0)continue;
    b[y][x]=attacker;
    if(gCheckWin(b,x,y,attacker)){b[y][x]=0;return{x:x,y:y}}
    // 对手防守: 必须阻止冲四
    var opp=3-attacker;
    var defMove=gFindDefend(b,attacker);
    if(defMove){
      b[defMove.y][defMove.x]=opp;
      if(!gCheckWin(b,defMove.x,defMove.y,opp)){
        var r=gVCF(b,attacker,depth-1);
        if(r){b[defMove.y][defMove.x]=0;b[y][x]=0;return{x:x,y:y}}
      }
      b[defMove.y][defMove.x]=0;
    }
    b[y][x]=0;
    if(gAbort)break;
  }
  return null;
}

// 找到防守冲四/活四的唯一点
function gFindDefend(b,attacker){
  var opp=3-attacker;
  var cs=gCands(b,1);
  for(var i=0;i<cs.length;i++){
    var x=cs[i].x,y=cs[i].y;
    if(b[y][x]!==0)continue;
    b[y][x]=opp;
    // 检查攻击方是否还有冲四或连五
    var stillThreat=false;
    var acs=gCands(b,1);
    for(var j=0;j<acs.length;j++){
      if(b[acs[j].y][acs[j].x]!==0)continue;
      var pc=gPatCount(b,acs[j].x,acs[j].y,attacker);
      if(pc.FIVE>0||pc.LIVE_FOUR>0||pc.RUSH_FOUR>0){stillThreat=true;break}
    }
    b[y][x]=0;
    if(!stillThreat)return{x:x,y:y};
  }
  return null;
}

// VCT搜索 (连续威胁搜索: 冲四+活三)
function gVCT(b,attacker,depth){
  if(depth<=0||gAbort)return null;
  var cs=gCands(b,1);
  cs.sort(function(a,c){return gEvalPt(b,c.x,c.y,attacker)-gEvalPt(b,a.x,a.y,attacker)});
  for(var i=0;i<cs.length;i++){
    var x=cs[i].x,y=cs[i].y;
    var pc=gPatCount(b,x,y,attacker);
    // 只考虑能形成活三或以上的着法
    if(pc.LIVE_THREE===0&&pc.RUSH_FOUR===0&&pc.LIVE_FOUR===0&&pc.FIVE===0)continue;
    b[y][x]=attacker;
    if(gCheckWin(b,x,y,attacker)){b[y][x]=0;return{x:x,y:y}}
    // 检查是否形成必胜局面(双活三/活三+冲四/活四)
    var apc=gPatCount(b,x,y,attacker);
    if(apc.LIVE_FOUR>0||apc.RUSH_FOUR>=2||(apc.RUSH_FOUR>0&&apc.LIVE_THREE>0)||apc.LIVE_THREE>=2){
      // 对手必须防守, 找防守点
      var opp=3-attacker;
      var defs=gDefendMoves(b,attacker);
      if(defs.length===0){b[y][x]=0;return{x:x,y:y}}
      var allWin=true;
      for(var j=0;j<defs.length;j++){
        b[defs[j].y][defs[j].x]=opp;
        if(gCheckWin(b,defs[j].x,defs[j].y,opp)){b[defs[j].y][defs[j].x]=0;allWin=false;break}
        var r=gVCT(b,attacker,depth-1);
        b[defs[j].y][defs[j].x]=0;
        if(!r){allWin=false;break}
      }
      if(allWin){b[y][x]=0;return{x:x,y:y}}
    }
    b[y][x]=0;
    if(gAbort)break;
  }
  return null;
}

// 找到所有防守点(针对活三/冲四威胁)
function gDefendMoves(b,attacker){
  var opp=3-attacker;
  var cs=gCands(b,1);
  var defs=[];
  for(var i=0;i<cs.length;i++){
    var x=cs[i].x,y=cs[i].y;
    if(b[y][x]!==0)continue;
    // 对手在此点落子后, 检查是否消除所有威胁
    b[y][x]=opp;
    var stillThreat=false;
    var acs=gCands(b,1);
    for(var j=0;j<acs.length;j++){
      if(b[acs[j].y][acs[j].x]!==0)continue;
      var pc=gPatCount(b,acs[j].x,acs[j].y,attacker);
      if(pc.FIVE>0||pc.LIVE_FOUR>0||pc.RUSH_FOUR>0||pc.LIVE_THREE>0){stillThreat=true;break}
    }
    b[y][x]=0;
    if(!stillThreat)defs.push({x:x,y:y});
  }
  return defs;
}

// 棋盘全局评估
function gEvalBoard(aiP,huP){
  var ai=0,hu=0;
  for(var y=0;y<GS;y++)for(var x=0;x<GS;x++){
    if(gB[y][x]===aiP)ai+=gEvalPt(gB,x,y,aiP);
    else if(gB[y][x]===huP)hu+=gEvalPt(gB,x,y,huP);
  }
  return ai-hu*1.08;
}

// 评估函数 - 防守权重提升
function gEvalBoard(aiP,huP){
  var ai=0,hu=0;
  for(var y=0;y<GS;y++)for(var x=0;x<GS;x++){
    if(gB[y][x]===aiP)ai+=gEvalPt(gB,x,y,aiP);
    else if(gB[y][x]===huP)hu+=gEvalPt(gB,x,y,huP);
  }
  // 大师难度时防守权重更高 (更谨慎)
  var hw=curDiff>=4?1.2:1.08;
  return ai-hu*hw;
}

// PVS搜索 (主变例搜索) + 空着剪枝 + 威胁延伸
function gAlphaBeta(b,depth,alpha,beta,maxP,aiP,huP,ply){
  gNodes++;
  var timeLimit=curDiff>=4?15000:5000;
  if(gAbort||(gNodes&1023)===0&&Date.now()-gStart>timeLimit){gAbort=true;return 0}
  if(ply>=64)return gEvalBoard(aiP,huP);
  // 置换表查询
  var h=gHash(b);
  var tt=gTT[h%gTTSize];
  if(tt&&tt.h===h&&tt.depth>=depth){
    if(tt.flag===0)return tt.score;
    if(tt.flag===1&&tt.score>=beta)return tt.score;
    if(tt.flag===2&&tt.score<=alpha)return tt.score;
  }
  if(depth===0)return gEvalBoard(aiP,huP);
  var cs=gCands(b,1);
  if(cs.length===0)return gEvalBoard(aiP,huP);
  // 威胁检测: 如果当前局面有活四/冲四威胁，增加搜索深度
  var threatExt=0;
  if(curDiff>=4&&depth>=2){
    for(var ti=0;ti<cs.length&&ti<6;ti++){
      var tpc=gPatCount(b,cs[ti].x,cs[ti].y,maxP?aiP:huP);
      if(tpc.LIVE_FOUR>0||tpc.RUSH_FOUR>0||tpc.FIVE>0){threatExt=1;break}
    }
  }
  var extDepth=depth+threatExt;
  // 空着剪枝 (depth>=3, 大师难度)
  if(curDiff>=4&&extDepth>=3&&!threatExt){
    var nullSc=-gAlphaBeta(b,extDepth-3,-beta,-beta+1,!maxP,aiP,huP,ply+1);
    if(gAbort)return 0;
    if(nullSc>=beta)return beta;
  }
  // 着法排序: 置换表最佳着法优先 + 评分排序
  var ttBestMove=tt?tt.bm:null;
  var scored=cs.map(function(c){
    var s=gEvalPt(b,c.x,c.y,maxP?aiP:huP)+gEvalPt(b,c.x,c.y,maxP?huP:aiP)*0.9;
    // 置换表最佳着法最优先
    if(ttBestMove&&ttBestMove.x===c.x&&ttBestMove.y===c.y)s+=100000;
    // 杀手走法加成
    if(gKiller[ply]&&gKiller[ply].x===c.x&&gKiller[ply].y===c.y)s+=5000;
    // 历史启发
    s+=gHistory[c.y*GS+c.x]||0;
    return{x:c.x,y:c.y,s:s};
  });
  scored.sort(function(a,c){return c.s-a.s});
  var topN=curDiff>=4?16:depth>=4?10:14;
  var top=scored.slice(0,topN);
  var bm=null,oa=alpha,first=true;
  for(var i=0;i<top.length;i++){
    var x=top[i].x,y=top[i].y;
    if(b[y][x]!==0)continue;
    b[y][x]=maxP?aiP:huP;
    if(gCheckWin(b,x,y,maxP?aiP:huP)){
      b[y][x]=0;
      var ws=maxP?900000+extDepth*100:-900000-extDepth*100;
      if(ws>=beta)return ws;
      if(ws>alpha){alpha=ws;bm={x:x,y:y};first=false}
      continue;
    }
    var sc;
    if(first){
      sc=-gAlphaBeta(b,extDepth-1,-beta,-alpha,!maxP,aiP,huP,ply+1);
    }else{
      // LMR (Late Move Reduction)
      var reduction=0;
      if(curDiff>=4&&i>=4&&extDepth>=3)reduction=1;
      sc=-gAlphaBeta(b,extDepth-1-reduction,-alpha-1,-alpha,!maxP,aiP,huP,ply+1);
      if(sc>alpha&&reduction>0){
        sc=-gAlphaBeta(b,extDepth-1,-beta,-alpha,!maxP,aiP,huP,ply+1);
      }
    }
    b[y][x]=0;
    if(gAbort)return 0;
    if(sc>=beta){
      if(!maxP){gKiller[ply]={x:x,y:y}}
      gHistory[y*GS+x]=(gHistory[y*GS+x]||0)+extDepth*extDepth;
      gTT[h%gTTSize]={h:h,depth:extDepth,score:sc,flag:1,bm:{x:x,y:y}};
      return sc;
    }
    if(sc>alpha){alpha=sc;bm={x:x,y:y};first=false}
  }
  var flag=first?2:0;
  gTT[h%gTTSize]={h:h,depth:extDepth,score:alpha,flag:flag,bm:bm};
  return alpha;
}

// 26种开局定式 (天元起手)
var GOMOKU_OPENINGS=[
  // 直止开局 D1-D13 (白2在黑1正侧方)
  {name:'寒星',w2:[0,1],b3:[0,-1]},{name:'溪月',w2:[0,1],b3:[1,-1]},
  {name:'疏星',w2:[0,1],b3:[1,0]},{name:'花月',w2:[0,1],b3:[1,1]},
  {name:'残月',w2:[0,1],b3:[0,1]},{name:'雨月',w2:[0,1],b3:[-1,1]},
  {name:'金星',w2:[0,1],b3:[-1,0]},{name:'松月',w2:[0,1],b3:[-1,-1]},
  {name:'丘月',w2:[0,1],b3:[1,-2]},{name:'新月',w2:[0,1],b3:[1,2]},
  {name:'瑞星',w2:[0,1],b3:[-1,2]},{name:'山月',w2:[0,1],b3:[-1,-2]},
  {name:'游星',w2:[0,1],b3:[0,2]},
  // 斜止开局 I1-I13 (白2在黑1斜侧方)
  {name:'长星',w2:[1,1],b3:[2,1]},{name:'峡月',w2:[1,1],b3:[1,2]},
  {name:'恒星',w2:[1,1],b3:[2,2]},{name:'水月',w2:[1,1],b3:[2,0]},
  {name:'流星',w2:[1,1],b3:[2,-1]},{name:'云月',w2:[1,1],b3:[1,0]},
  {name:'浦月',w2:[1,1],b3:[0,1]},{name:'岚月',w2:[1,1],b3:[0,2]},
  {name:'银月',w2:[1,1],b3:[-1,1]},{name:'明星',w2:[1,1],b3:[1,-1]},
  {name:'斜月',w2:[1,1],b3:[2,-2]},{name:'名月',w2:[1,1],b3:[-1,2]},
  {name:'彗星',w2:[1,1],b3:[-1,-1]}
];
// 五子棋威胁分析: 分析当前局面的威胁等级
function gThreatAnalysis(b,p){
  var opp=3-p;
  var myThreats={five:0,liveFour:0,rushFour:0,liveThree:0,sleepThree:0,liveTwo:0};
  var oppThreats={five:0,liveFour:0,rushFour:0,liveThree:0,sleepThree:0,liveTwo:0};
  var cs=gCands(b,2);
  for(var i=0;i<cs.length;i++){
    var x=cs[i].x,y=cs[i].y;
    // 己方威胁
    var mpc=gPatCount(b,x,y,p);
    if(mpc.FIVE)myThreats.five++;
    if(mpc.LIVE_FOUR)myThreats.liveFour++;
    if(mpc.RUSH_FOUR)myThreats.rushFour++;
    if(mpc.LIVE_THREE)myThreats.liveThree++;
    if(mpc.SLEEP_THREE)myThreats.sleepThree++;
    if(mpc.LIVE_TWO)myThreats.liveTwo++;
    // 对方威胁
    var opc=gPatCount(b,x,y,opp);
    if(opc.FIVE)oppThreats.five++;
    if(opc.LIVE_FOUR)oppThreats.liveFour++;
    if(opc.RUSH_FOUR)oppThreats.rushFour++;
    if(opc.LIVE_THREE)oppThreats.liveThree++;
    if(opc.SLEEP_THREE)oppThreats.sleepThree++;
    if(opc.LIVE_TWO)oppThreats.liveTwo++;
  }
  return{my:myThreats,opp:oppThreats};
}
// 根据威胁分析决定策略: 进攻/防守/均衡
function gStrategy(b,p){
  var ta=gThreatAnalysis(b,p);
  // 对方有连五威胁 -> 必须防守
  if(ta.opp.five>0)return'must_defend';
  // 己方有连五机会 -> 进攻
  if(ta.my.five>0)return'must_attack';
  // 对方有活四 -> 必须防守
  if(ta.opp.liveFour>0)return'must_defend';
  // 己方有活四 -> 进攻
  if(ta.my.liveFour>0)return'must_attack';
  // 己方有双活三或活三+冲四 -> 进攻
  if(ta.my.liveThree>=2||(ta.my.liveThree>=1&&ta.my.rushFour>=1))return'attack';
  // 对方有双活三或活三+冲四 -> 防守
  if(ta.opp.liveThree>=2||(ta.opp.liveThree>=1&&ta.opp.rushFour>=1))return'defend';
  // 己方有活三 -> 进攻
  if(ta.my.liveThree>=1)return'attack';
  // 对方有活三 -> 防守
  if(ta.opp.liveThree>=1)return'defend';
  // 默认: 均衡
  return'balance';
}

function gAIMove(){
  var aiP=playerFirst?2:1,huP=playerFirst?1:2;
  gNodes=0;gStart=Date.now();gAbort=false;
  gTTSize=curDiff>=4?200003:100003;
  gTT=new Array(gTTSize);
  gKiller=new Array(24);
  gHistory=new Array(GS*GS).fill(0);
  
  var cs=gCands(gB,2);
  var info='';
  
  // 开局阶段: 使用定式
  var stoneCount=0;
  for(var y=0;y<GS;y++)for(var x=0;x<GS;x++)if(gB[y][x]!==0)stoneCount++;
  
  if(stoneCount===0){
    // AI先手, 下天元
    showAIInfo('<span class="tag">开局</span> 天元');
    return{x:7,y:7};
  }
  if(stoneCount===1){
    // 对方已下天元, AI应手用定式
    var op=GOMOKU_OPENINGS[Math.floor(Math.random()*GOMOKU_OPENINGS.length)];
    // 找到对方的位置
    var ox=7,oy=7;
    for(var yy=0;yy<GS;yy++)for(var xx=0;xx<GS;xx++)if(gB[yy][xx]===1){ox=xx;oy=yy}
    var wx=ox+op.w2[0],wy=oy+op.w2[1];
    if(wx>=0&&wx<GS&&wy>=0&&wy<GS&&gB[wy][wx]===0){
      showAIInfo('<span class="tag">开局定式</span> '+op.name);
      return{x:wx,y:wy};
    }
  }
  
  // 1. 必胜: 连五
  for(var i=0;i<cs.length;i++){
    gB[cs[i].y][cs[i].x]=aiP;
    if(gCheckWin(gB,cs[i].x,cs[i].y,aiP)){gB[cs[i].y][cs[i].x]=0;showAIInfo('<span class="tag">连五</span> 致胜一手');return cs[i]}
    gB[cs[i].y][cs[i].x]=0;
  }
  // 2. 必防: 阻止对方连五
  for(var i=0;i<cs.length;i++){
    gB[cs[i].y][cs[i].x]=huP;
    if(gCheckWin(gB,cs[i].x,cs[i].y,huP)){gB[cs[i].y][cs[i].x]=0;showAIInfo('<span class="tag">防守</span> 阻止连五');return cs[i]}
    gB[cs[i].y][cs[i].x]=0;
  }
  // 3. 活四进攻
  for(var i=0;i<cs.length;i++){
    var pc=gPatCount(gB,cs[i].x,cs[i].y,aiP);
    if(pc.LIVE_FOUR>0){showAIInfo('<span class="tag">进攻</span> 活四');return cs[i]}
  }
  // 4. 防守对方活四
  for(var i=0;i<cs.length;i++){
    var pc=gPatCount(gB,cs[i].x,cs[i].y,huP);
    if(pc.LIVE_FOUR>0){showAIInfo('<span class="tag">防守</span> 阻活四');return cs[i]}
  }
  // 5. VCF搜索 (难度2+)
  if(curDiff>=2){
    var vcfDepth=curDiff>=4?28:curDiff===3?14:8;
    var vcf=gVCF(gB,aiP,vcfDepth);
    if(vcf){showAIInfo('<span class="tag">VCF</span> 连续冲四杀 (深度'+vcfDepth+')');return vcf}
    // 防守对方VCF
    var dvcf=gVCF(gB,huP,vcfDepth-4);
    if(dvcf){
      // 检查自己是否有活四反击
      var hasOff=false;
      for(var i=0;i<cs.length;i++){
        var apc=gPatCount(gB,cs[i].x,cs[i].y,aiP);
        if(apc.LIVE_FOUR>0){hasOff=true;showAIInfo('<span class="tag">反击</span> 活四反击');return cs[i]}
      }
      if(!hasOff){showAIInfo('<span class="tag">防守</span> 阻VCF');return dvcf}
    }
  }
  // 6. VCT搜索 (难度3+)
  if(curDiff>=3){
    var vctDepth=curDiff>=4?18:6;
    var vct=gVCT(gB,aiP,vctDepth);
    if(vct){showAIInfo('<span class="tag">VCT</span> 连续威胁杀');return vct}
    var dvct=gVCT(gB,huP,curDiff>=4?10:6);
    if(dvct){showAIInfo('<span class="tag">防守</span> 阻VCT');return dvct}
  }
  // 7. 双活三进攻
  for(var i=0;i<cs.length;i++){
    var pc=gPatCount(gB,cs[i].x,cs[i].y,aiP);
    if(pc.LIVE_THREE>=2){showAIInfo('<span class="tag">进攻</span> 双活三');return cs[i]}
  }
  // 8. 防守对方双活三
  for(var i=0;i<cs.length;i++){
    var pc=gPatCount(gB,cs[i].x,cs[i].y,huP);
    if(pc.LIVE_THREE>=2){showAIInfo('<span class="tag">防守</span> 阻双活三');return cs[i]}
  }
  // 9. 迭代加深PVS搜索 (根节点也用PVS+ aspiration window)
  var maxDepth=curDiff===1?4:curDiff===2?6:curDiff===3?8:16;
  var scored=cs.map(function(c){
    return{x:c.x,y:c.y,s:gEvalPt(gB,c.x,c.y,aiP)*1.5+gEvalPt(gB,c.x,c.y,huP)*1.2}
  });
  scored.sort(function(a,c){return c.s-a.s});
  var topN=curDiff>=4?24:curDiff>=3?16:10;
  var top=scored.slice(0,Math.min(topN,scored.length));
  var best=top[0],bs=-Infinity;
  var timeLimit=curDiff>=4?15000:5000;
  // 迭代加深: 逐步增加深度,利用置换表
  for(var id=2;id<=maxDepth;id+=2){
    var alpha=-Infinity,beta=Infinity;
    // aspiration window (第3次迭代后用窄窗口加速)
    if(id>=6&&bs>-900000&&bs<900000){
      alpha=bs-50;beta=bs+50;
    }
    var rootBest=null,rootScore=-Infinity;
    for(var i=0;i<top.length;i++){
      gB[top[i].y][top[i].x]=aiP;
      var sc;
      if(i===0){
        sc=-gAlphaBeta(gB,id-1,-beta,-alpha,false,aiP,huP,0);
      }else{
        // PVS: 先用零窗口搜索
        sc=-gAlphaBeta(gB,id-1,-alpha-1,-alpha,false,aiP,huP,0);
        if(sc>alpha&&sc<beta){
          // 重搜索
          sc=-gAlphaBeta(gB,id-1,-beta,-alpha,false,aiP,huP,0);
        }
      }
      gB[top[i].y][top[i].x]=0;
      if(gAbort)break;
      if(curDiff<=1)sc+=Math.random()*8-4;
      if(sc>rootScore){rootScore=sc;rootBest=top[i]}
      if(sc>alpha)alpha=sc;
    }
    if(gAbort)break;
    if(rootBest){best=rootBest;bs=rootScore}
    // aspiration window失败: 重新搜索
    if(bs<=alpha-50||bs>=beta+50){
      gAbort=false;gStart=Date.now();
      for(var ri=0;ri<top.length;ri++){
        gB[top[ri].y][top[ri].x]=aiP;
        var rsc=-gAlphaBeta(gB,id-1,-Infinity,Infinity,false,aiP,huP,0);
        gB[top[ri].y][top[ri].x]=0;
        if(gAbort)break;
        if(rsc>rootScore){rootScore=rsc;rootBest=top[ri]}
      }
      if(rootBest){best=rootBest;bs=rootScore}
    }
    // 时间检查
    if(Date.now()-gStart>timeLimit)break;
  }
  info='<span class="tag">搜索</span> 深度'+maxDepth+' 节点'+gNodes;
  if(bs>800000)info+=' [优势]';
  else if(bs<-800000)info+=' [劣势]';
  showAIInfo(info);
  // 显示胜率 (AI视角,反转给玩家看)
  var wr=scoreToWinRate(bs);
  showWinRate(playerFirst?(100-wr):wr);
  return best;
}

//  围棋 (19路) — 增强MCTS + RAVE + 模式匹配 + 征子判断
//  修复: 全局使用GSZ代替硬编码9

var GSZ=19,GOP=24,GOC=30,GOR=13,GOSZ=GOC*(GSZ-1)+GOP*2;
var goB,goKo,goLast,goCur,goPass,goOver,goAi,goH,goCaps,goAbort,goHist;

// 邻居计算
var goNbCache=[];
function goNb(x,y){
  var key=x*GSZ+y;
  if(goNbCache[key])return goNbCache[key];
  var r=[];
  if(x>0)r.push([x-1,y]);if(x<GSZ-1)r.push([x+1,y]);
  if(y>0)r.push([x,y-1]);if(y<GSZ-1)r.push([x,y+1]);
  goNbCache[key]=r;return r;
}
// 计算棋链和气
function goGrp(b,x,y){
  var c=b[x][y];if(c===0)return{stones:[],liberties:[]};
  var vis={},st=[],lb={},q=[[x,y]];vis[x*GSZ+y]=true;
  while(q.length>0){
    var cu=q.shift(),cx2=cu[0],cy2=cu[1];st.push([cx2,cy2]);
    var ns=goNb(cx2,cy2);
    for(var i=0;i<ns.length;i++){
      var nx=ns[i][0],ny=ns[i][1],k=nx*GSZ+ny;
      if(b[nx][ny]===0)lb[k]=true;
      else if(b[nx][ny]===c&&!vis[k]){vis[k]=true;q.push([nx,ny])}
    }
  }
  return{stones:st,liberties:Object.keys(lb)};
}
// 尝试落子
function goTry(b,x,y,c,ko){
  if(x<0||x>=GSZ||y<0||y>=GSZ||b[x][y]!==0)return{valid:false};
  if(ko&&ko.x===x&&ko.y===y)return{valid:false};
  var nb=b.map(function(r){return r.slice()});nb[x][y]=c;
  var opp=c===1?2:1,cap=[];
  var ns=goNb(x,y);
  for(var i=0;i<ns.length;i++){
    var nx=ns[i][0],ny=ns[i][1];
    if(nb[nx][ny]===opp){
      var g=goGrp(nb,nx,ny);
      if(g.liberties.length===0){
        for(var j=0;j<g.stones.length;j++){
          nb[g.stones[j][0]][g.stones[j][1]]=0;cap.push([g.stones[j][0],g.stones[j][1]]);
        }
      }
    }
  }
  var og=goGrp(nb,x,y);
  if(og.liberties.length===0)return{valid:false};
  var nk=null;
  if(cap.length===1&&og.stones.length===1)nk={x:cap[0][0],y:cap[0][1]};
  return{valid:true,captured:cap,newBoard:nb,newKo:nk};
}
function goLegal(b,c,ko){
  var m=[];
  for(var x=0;x<GSZ;x++)for(var y=0;y<GSZ;y++){
    if(b[x][y]!==0)continue;
    var r=goTry(b,x,y,c,ko);
    if(r.valid)m.push([x,y]);
  }
  return m;
}
// 眼判断 (真眼/假眼)
function goIsEye(b,x,y,c){
  var ns=goNb(x,y);
  for(var i=0;i<ns.length;i++)if(b[ns[i][0]][ns[i][1]]!==c)return false;
  // 检查田字四角
  var dg=[[x-1,y-1],[x+1,y-1],[x-1,y+1],[x+1,y+1]],sc=0,wl=0;
  for(var i=0;i<dg.length;i++){
    if(dg[i][0]<0||dg[i][0]>=GSZ||dg[i][1]<0||dg[i][1]>=GSZ)wl++;
    else if(b[dg[i][0]][dg[i][1]]===c)sc++;
    else wl++;
  }
  // 边角: 至少1角同色; 边: 至少2角; 中央: 至少3角
  if(wl>0)return(sc+wl>=4);
  return sc>=3;
}
function goFilt(b,m,c){
  return m.filter(function(mm){return!goIsEye(b,mm[0],mm[1],c)});
}
// 征子检测: 判断从(x,y)开始征子是否成立
function goLadder(b,x,y,c){
  var opp=c===1?2:1;
  var g=goGrp(b,x,y);
  if(g.liberties.length!==1)return false;
  return goLadderRec(b,g,c,opp,0);
}
// 征子递归搜索：防守方逃跑后，攻击方尝试两手都试
function goLadderRec(tb,g,c,opp,depth){
  if(depth>80)return true;
  var lib=g.liberties[0];
  var lx=parseInt(lib/GSZ),ly=parseInt(lib%GSZ);
  var dr=goTry(tb,lx,ly,c,null);
  if(!dr.valid)return true;
  var ng=goGrp(dr.newBoard,lx,ly);
  if(ng.liberties.length===0)return true;
  if(ng.liberties.length>=3)return false;
  if(ng.liberties.length===1){
    var lib2=ng.liberties[0];
    var ax=parseInt(lib2/GSZ),ay=parseInt(lib2%GSZ);
    var ar=goTry(dr.newBoard,ax,ay,opp,null);
    if(!ar.valid)return false;
    return true;
  }
  // 2气：攻击方两手都试，任一成功则征子成立
  for(var i=0;i<2;i++){
    var alib=ng.liberties[i];
    var ax2=parseInt(alib/GSZ),ay2=parseInt(alib%GSZ);
    var ar2=goTry(dr.newBoard,ax2,ay2,opp,null);
    if(!ar2.valid)continue;
    var ds=null;
    for(var j=0;j<ng.stones.length;j++){
      if(ar2.newBoard[ng.stones[j][0]][ng.stones[j][1]]===c){ds=ng.stones[j];break}
    }
    if(!ds)return true;
    var dg=goGrp(ar2.newBoard,ds[0],ds[1]);
    if(dg.liberties.length===0)return true;
    if(dg.liberties.length===1){
      if(goLadderRec(ar2.newBoard,dg,c,opp,depth+1))return true;
    }
  }
  return false;
}
// 势力图评估
function goInfluence(b){
  var inf=[];
  for(var i=0;i<GSZ;i++)inf.push(new Array(GSZ).fill(0));
  for(var x=0;x<GSZ;x++)for(var y=0;y<GSZ;y++){
    if(b[x][y]===0)continue;
    var val=b[x][y]===1?1:-1;
    for(var dx=-4;dx<=4;dx++)for(var dy=-4;dy<=4;dy++){
      var nx=x+dx,ny=y+dy,d=Math.abs(dx)+Math.abs(dy);
      if(nx<0||nx>=GSZ||ny<0||ny>=GSZ||d===0)continue;
      var decay=d<=1?0.8:d<=2?0.4:d<=3?0.2:0.1;
      inf[nx][ny]+=val*decay;
    }
  }
  return inf;
}
// 领地估算 (Bouzy膨胀腐蚀法)
function goTerr(b){
  var t=[];
  for(var i=0;i<GSZ;i++)t.push(new Array(GSZ).fill(0));
  var vis=[];
  for(var i=0;i<GSZ;i++)vis.push(new Array(GSZ).fill(false));
  for(var x=0;x<GSZ;x++)for(var y=0;y<GSZ;y++){
    if(b[x][y]!==0||vis[x][y])continue;
    var reg=[],bd={},q=[[x,y]];vis[x][y]=true;
    while(q.length>0){
      var cu=q.shift(),cx2=cu[0],cy2=cu[1];reg.push([cx2,cy2]);
      var ns=goNb(cx2,cy2);
      for(var i=0;i<ns.length;i++){
        var nx=ns[i][0],ny=ns[i][1];
        if(b[nx][ny]===0&&!vis[nx][ny]){vis[nx][ny]=true;q.push([nx,ny])}
        else if(b[nx][ny]!==0)bd[b[nx][ny]]=true;
      }
    }
    var bk=Object.keys(bd);
    if(bk.length===1){
      var o=parseInt(bk[0]);
      for(var i=0;i<reg.length;i++)t[reg[i][0]][reg[i][1]]=o;
    }
  }
  return t;
}
function goScore(b){
  var t=goTerr(b),bk=0,wt=0;
  for(var x=0;x<GSZ;x++)for(var y=0;y<GSZ;y++){
    if(b[x][y]===1)bk++;
    else if(b[x][y]===2)wt++;
    else if(t[x][y]===1)bk++;
    else if(t[x][y]===2)wt++;
  }
  wt+=7.5;
  return{black:bk,white:wt};
}
// Benson算法: 无条件活棋静态判定
// 拥有两个不重叠关键围区(真眼)的棋链是无条件活的
function goBenson(b){
  var alive={1:[],2:[]}; // 各方无条件活棋链
  // 1. 找出所有棋链
  var chains={1:[],2:[]};
  var visited=[];
  for(var i=0;i<GSZ;i++)visited.push(new Array(GSZ).fill(false));
  for(var x=0;x<GSZ;x++)for(var y=0;y<GSZ;y++){
    if(b[x][y]===0||visited[x][y])continue;
    var c=b[x][y];
    var g=goGrp(b,x,y);
    var chain={color:c,stones:g.stones,liberties:g.liberties.map(function(l){return[parseInt(l/GSZ),parseInt(l%GSZ)]})};
    chains[c].push(chain);
    for(var i2=0;i2<g.stones.length;i2++)visited[g.stones[i2][0]][g.stones[i2][1]]=true;
  }
  // 2. 找出所有围区(空点连通区域, 边界全为同色)
  var regions=[];
  var rvis=[];
  for(var i=0;i<GSZ;i++)rvis.push(new Array(GSZ).fill(false));
  for(var x=0;x<GSZ;x++)for(var y=0;y<GSZ;y++){
    if(b[x][y]!==0||rvis[x][y])continue;
    var reg=[],bdr={},q=[[x,y]];rvis[x][y]=true;
    while(q.length>0){
      var cu=q.shift(),cx2=cu[0],cy2=cu[1];reg.push([cx2,cy2]);
      var ns=goNb(cx2,cy2);
      for(var i2=0;i2<ns.length;i2++){
        var nx=ns[i2][0],ny=ns[i2][1];
        if(b[nx][ny]===0&&!rvis[nx][ny]){rvis[nx][ny]=true;q.push([nx,ny])}
        else if(b[nx][ny]!==0)bdr[b[nx][ny]]=true;
      }
    }
    var bkeys=Object.keys(bdr);
    if(bkeys.length===1){
      regions.push({color:parseInt(bkeys[0]),points:reg});
    }
  }
  // 3. 迭代判定: 检查每条链是否有>=2个关键围区
  var changed=true;
  var aliveChains={1:new Set(),2:new Set()};
  while(changed){
    changed=false;
    for(var ci=0;ci<2;ci++){
      var c=ci+1;
      for(var i=0;i<chains[c].length;i++){
        var chain=chains[c][i];
        if(aliveChains[c].has(i))continue;
        // 计算关键围区数
        var vitalCount=0;
        for(var j=0;j<regions.length;j++){
          if(regions[j].color!==c)continue;
          // 检查该围区是否是这条链的关键围区
          // 围区的每个点都必须是这条链的气
          var isVital=true;
          var chainLibSet={};
          for(var li=0;li<chain.liberties.length;li++)chainLibSet[chain.liberties[li][0]*GSZ+chain.liberties[li][1]]=true;
          for(var pi=0;pi<regions[j].points.length;pi++){
            var pt=regions[j].points[pi];
            if(!chainLibSet[pt[0]*GSZ+pt[1]]){isVital=false;break}
          }
          if(isVital)vitalCount++;
        }
        if(vitalCount>=2){
          aliveChains[c].add(i);
          changed=true;
        }
      }
    }
  }
  // 4. 收集活棋
  for(var ci=0;ci<2;ci++){
    var c=ci+1;
    aliveChains[c].forEach(function(idx){
      var chain=chains[c][idx];
      for(var i=0;i<chain.stones.length;i++)alive[c].push(chain.stones[i]);
    });
  }
  return alive;
}
// Go定式库 (角部常见变化)
var GO_JOSEKI=[

// 检查是否匹配定式
function goMatchJoseki(b){
  var stones=[];
  for(var x=0;x<GSZ;x++)for(var y=0;y<GSZ;y++)if(b[x][y]!==0)stones.push([x,y,b[x][y]]);
  if(stones.length>12)return null;
  for(var i=0;i<GO_JOSEKI.length;i++){
    var j=GO_JOSEKI[i];
    if(stones.length>=j.moves.length)continue;
    var match=true;
    for(var k=0;k<stones.length;k++){
      if(stones[k][0]!==j.moves[k][0]||stones[k][1]!==j.moves[k][1]||stones[k][2]!==j.moves[k][2]){match=false;break}
    }
    if(match){
      var next=j.moves[stones.length];
      // 对称变换匹配
      var r=goTry(b,next[0],next[1],next[2],null);
      if(r.valid)return{x:next[0],y:next[1]};
      // 尝试旋转对称
      var sx1=GSZ-1-next[0],sy1=next[1];
      r=goTry(b,sx1,sy1,next[2],null);
      if(r.valid)return{x:sx1,y:sy1};
      // 尝试镜像对称
      var sx2=next[0],sy2=GSZ-1-next[1];
      r=goTry(b,sx2,sy2,next[2],null);
      if(r.valid)return{x:sx2,y:sy2};
      // 尝试中心对称
      var sx3=GSZ-1-next[0],sy3=GSZ-1-next[1];
      r=goTry(b,sx3,sy3,next[2],null);
      if(r.valid)return{x:sx3,y:sy3};
    }
  }
  return null;
}
// 3x3模式匹配 (用于rollout)
function go3x3(b,x,y,c){
  var opp=c===1?2:1;
  var pat=0;
  // 8邻域编码: 3^8 = 6561种模式
  var dx=[-1,0,1,-1,1,-1,0,1],dy=[-1,-1,-1,0,0,1,1,1];
  for(var i=0;i<8;i++){
    var nx=x+dx[i],ny=y+dy[i];
    var v=0;
    if(nx<0||nx>=GSZ||ny<0||ny>=GSZ)v=2; // 边界视为对方
    else if(b[nx][ny]===c)v=1;
    else if(b[nx][ny]===opp)v=2;
    pat=pat*3+v;
  }
  return pat;
}
// 模式权重表 (简化: 邻接己方子加分)
function goPatternWeight(b,x,y,c){
  var w=1.0;
  var ns=goNb(x,y);
  var own=0,opp=0;
  for(var i=0;i<ns.length;i++){
    if(b[ns[i][0]][ns[i][1]]===c)own++;
    else if(b[ns[i][0]][ns[i][1]]===3-c)opp++;
  }
  // 紧邻己方: 好形
  if(own>=1)w+=0.5;
  if(own>=2)w+=0.3;
  // 紧邻对方: 接触战
  if(opp>=1)w+=0.4;
  // 跳/尖: 距离2的好形
  var dg=[[x-1,y-1],[x+1,y-1],[x-1,y+1],[x+1,y+1]];
  for(var i=0;i<dg.length;i++){
    if(dg[i][0]>=0&&dg[i][0]<GSZ&&dg[i][1]>=0&&dg[i][1]<GSZ&&b[dg[i][0]][dg[i][1]]===c)w+=0.2;
  }
  // 三线四线优先
  var edge=Math.min(x,y,GSZ-1-x,GSZ-1-y);
  if(edge===2)w+=0.15;
  if(edge===3)w+=0.25;
  if(edge===0)w*=0.3; // 一线避免
  if(edge===1)w*=0.6; // 二线降低
  return w;
}
// Rollout模拟
function goSim(b,c,ko,max){
  var sb=b.map(function(r){return r.slice()}),sk=ko?{x:ko.x,y:ko.y}:null,sc=c,ps=0,mc=0;
  while(ps<2&&mc<max){
    var m=goLegal(sb,sc,sk);
    if(m.length===0){ps++;sk=null;sc=sc===1?2:1;mc++;continue}
    var f=goFilt(sb,m,sc);
    var um=f.length>0?f:m;
    var ch=null,opp=sc===1?2:1;
    // 策略1: 提子 (吃只剩1气的对方棋链, 征子成立时优先)
    for(var i=0;i<um.length;i++){
      var ns=goNb(um[i][0],um[i][1]);
      for(var j=0;j<ns.length;j++){
        if(sb[ns[j][0]][ns[j][1]]===opp){
          var g=goGrp(sb,ns[j][0],ns[j][1]);
          if(g.liberties.length===1){
            // 征子成立时必定提子; 不成立也提(对方跑不掉的1气棋链)
            ch=um[i];break;
          }
        }
      }
      if(ch)break;
    }
    // 策略2: 救子 (己方棋链只剩1气时逃跑, 但征子不成立时才跑)
    if(!ch){
      for(var i=0;i<um.length;i++){
        var ns2=goNb(um[i][0],um[i][1]);
        for(var j=0;j<ns2.length;j++){
          if(sb[ns2[j][0]][ns2[j][1]]===sc){
            var g2=goGrp(sb,ns2[j][0],ns2[j][1]);
            if(g2.liberties.length===1){
              // 检查征子: 如果对方征子成立, 逃跑无意义, 跳过
              if(!goLadder(sb,ns2[j][0],ns2[j][1],sc)){ch=um[i];break}
            }
          }
        }
        if(ch)break;
      }
    }
    // 策略3: 模式加权随机
    if(!ch){
      var nr=[],tw=0;
      for(var i=0;i<um.length;i++){
        var ns3=goNb(um[i][0],um[i][1]);
        var near=false;
        for(var j=0;j<ns3.length;j++){if(sb[ns3[j][0]][ns3[j][1]]!==0){near=true;break}}
        if(near){
          var w=goPatternWeight(sb,um[i][0],um[i][1],sc);
          nr.push({m:um[i],w:w});tw+=w;
        }
      }
      if(nr.length>0&&tw>0){
        var rnd=Math.random()*tw,cw=0;
        for(var i=0;i<nr.length;i++){cw+=nr[i].w;if(rnd<=cw){ch=nr[i].m;break}}
      }
      if(!ch){
        var pool=um;
        ch=pool[Math.floor(Math.random()*pool.length)];
      }
    }
    var r=goTry(sb,ch[0],ch[1],sc,sk);
    if(r.valid){sb=r.newBoard;sk=r.newKo}
    else{sk=null}
    ps=0;sc=sc===1?2:1;mc++;
  }
  // 评估: 中国规则计分
  var t=goTerr(sb),bk=0,wt=0;
  for(var x=0;x<GSZ;x++)for(var y=0;y<GSZ;y++){
    if(sb[x][y]===1)bk++;
    else if(sb[x][y]===2)wt++;
    else if(t[x][y]===1)bk++;
    else if(t[x][y]===2)wt++;
  }
  wt+=7.5;
  var d=bk-wt;
  return 1/(1+Math.exp(-d*0.4*(c===1?1:-1)));
}
// 增强MCTS with RAVE
function goMCTS(b,c,ko,onMCTSResult){
  // 先检查定式
  if(curDiff>=2){
    var joseki=goMatchJoseki(b);
    if(joseki){
      showAIInfo('<span class="tag">定式</span> 角部定式应手');
      onMCTSResult({move:[joseki.x,joseki.y]});return;
    }
  }
  var ST=[[3,3],[3,9],[3,15],[9,3],[9,9],[9,15],[15,3],[15,9],[15,15]];
  var m=goLegal(b,c,ko);
  var cnt=0;
  for(var x=0;x<GSZ;x++)for(var y=0;y<GSZ;y++)if(b[x][y]!==0)cnt++;
  // 开局优先星位
  if(cnt<=8){
    var gm=m.filter(function(mm){return ST.some(function(p){return p[0]===mm[0]&&p[1]===mm[1]})});
    if(gm.length>0)m=gm;
  }
  var f=goFilt(b,m,c),um=f.length>0?f:m;
  if(um.length===0){onMCTSResult(null);return}
  // 难度控制模拟次数（优化:避免UI长时间冻结）
  var SIMS=curDiff===1?200:curDiff===2?400:curDiff===3?700:1000;
  var MAXSIM=curDiff===1?40:curDiff===2?60:curDiff===3?80:100;
  // RAVE数据结构
  var root={parent:null,move:null,color:c===1?2:1,children:[],visits:0,wins:0,
    untried:um.map(function(v){return[v[0],v[1]]}),
    raveV:{},raveW:{}};
  var nodes=0;
  var mctsStart=Date.now();
  var CHUNK=50; // 每批模拟数，之间让出事件循环
  var si=0;
  function runChunk(){
    if(goAbort){onDone();return}
    var end=Math.min(si+CHUNK,SIMS);
    for(var s=si;s<end;s++){
      if((s&15)===0&&Date.now()-mctsStart>4000)break;
      var node=root,sb=b.map(function(r){return r.slice()}),sk=ko?{x:ko.x,y:ko.y}:null;
      var playedMoves=[]; // 记录本次模拟的着法 (用于RAVE)
      // Selection
      while(node.untried.length===0&&node.children.length>0){
        var best=null,bv=-Infinity;
        for(var i=0;i<node.children.length;i++){
          var ch=node.children[i];
          if(ch.visits===0){best=ch;break}
          // UCT + RAVE
          var mcVal=ch.wins/ch.visits;
          var raveN=ch.raveV[ch.move?ch.move[0]*GSZ+ch.move[1]:0]||0;
          var raveW=ch.raveW[ch.move?ch.move[0]*GSZ+ch.move[1]:0]||0;
          var raveVal=raveN>0?raveW/raveN:0.5;
          var beta=raveN/(raveN+ch.visits+4*0.5*raveN*ch.visits);
          var q=(1-beta)*mcVal+beta*raveVal;
          var ucb=q+1.4*Math.sqrt(Math.log(node.visits)/ch.visits);
          if(ucb>bv){bv=ucb;best=ch}
        }
        if(!best)break;
        node=best;
        if(node.move){
          var r=goTry(sb,node.move[0],node.move[1],node.color,sk);
          if(!r.valid)break;
          sb=r.newBoard;sk=r.newKo;
          playedMoves.push({move:node.move,color:node.color});
        }
      }
      // Expansion
      if(node.untried.length>0){
        var idx=Math.floor(Math.random()*node.untried.length);
        var mv=node.untried.splice(idx,1)[0];
        var mc2=node.color===1?2:1;
        var r2=goTry(sb,mv[0],mv[1],mc2,sk);
        if(r2.valid){sb=r2.newBoard;sk=r2.newKo}
        var cm=goLegal(sb,mc2===1?2:1,sk),cf=goFilt(sb,cm,mc2===1?2:1);
        var child={parent:node,move:mv,color:mc2,children:[],visits:0,wins:0,
          untried:(cf.length>0?cf:cm).map(function(v){return[v[0],v[1]]}),
          raveV:{},raveW:{}};
        node.children.push(child);node=child;
        playedMoves.push({move:mv,color:mc2});
      }
      // Simulation
      var sr=goSim(sb,node.color===1?2:1,sk,MAXSIM);
      // sr = P(opponent of node.color wins) = P(mover wins)
      // Backpropagation with RAVE - use toggle to alternate sr/1-sr up the tree
      var n=node;
      var addSr=false;
      while(n!==null){
        n.visits++;
        var wp=addSr?sr:(1-sr);
        n.wins+=wp;
        for(var pi=0;pi<playedMoves.length;pi++){
          if(playedMoves[pi].color===n.color){
            var mk=playedMoves[pi].move[0]*GSZ+playedMoves[pi].move[1];
            n.raveV[mk]=(n.raveV[mk]||0)+1;
            n.raveW[mk]=(n.raveW[mk]||0)+wp;
          }
        }
        addSr=!addSr;
        n=n.parent;
      }
      nodes++;
    }
    si=end;
    if(si<SIMS&&!goAbort){setTimeout(runChunk,0)}
    else{onDone()}
  }
  function onDone(){
    // 选最佳着法 (最高访问次数)
    var bn=null,bvis=-1;
    for(var i=0;i<root.children.length;i++){
      if(root.children[i].visits>bvis){bvis=root.children[i].visits;bn=root.children[i]}
    }
    var aiWr=50;
    var info='<span class="tag">MCTS</span> '+si+'次模拟 RAVE '+nodes+'节点';
    if(bn){
      aiWr=bn.wins/bn.visits*100;
      info+=' 胜率'+aiWr.toFixed(1)+'%';
    }
    showAIInfo(info);
    // 显示玩家胜率 (AI胜率反转)
    showWinRate(100-aiWr);
    onMCTSResult(bn?{move:bn.move}:null);
  }
  setTimeout(runChunk,0);
}

function goPlay(x,y){

function xqAIMove(){

    }

      for(var r=0;r<10&&boardMatches;r++)for(var c=0;c<9&&boardMatches;c++){
        if(xqB[r][c]!==sb[r][c])boardMatches=false;
      }
    }
    if(boardMatches){
      for(var oi=0;oi<XQ_OPENINGS.length;oi++){
        var ops=XQ_OPENINGS[oi];
        if(xqHist.length>=ops.length)continue;
        var match=true;
        for(var hi2=0;hi2<xqHist.length;hi2++){
          if(xqHist[hi2].fr!==ops[hi2].fr||xqHist[hi2].fc!==ops[hi2].fc||xqHist[hi2].tr!==ops[hi2].tr||xqHist[hi2].tc!==ops[hi2].tc){match=false;break}
        }
        if(match){
          var om=ops[xqHist.length];
          var lg=xqLegalMoves(xqB,aiRed);
        for(var i=0;i<lg.length;i++){
          if(lg[i].fr===om.fr&&lg[i].fc===om.fc&&lg[i].tr===om.tr&&lg[i].tc===om.tc){
            showAIInfo('<span class="tag">开局库</span> 第'+(xqHist.length+1)+'手');
            return lg[i];
          }
        }
      }
    }
    }
  }
  xqNodes=0;xqStart=Date.now();xqAbort=false;xqTT=new Map();
  xqKiller=new Array(20);xqHist2=[];
  for(var i=0;i<90;i++)xqHist2.push([]);
  var moves=xqLegalMoves(xqB,aiRed);
  if(moves.length===0)return null;
  var best=moves[0],bestScore=-Infinity;
  var maxDepth=curDiff===1?4:curDiff===2?6:curDiff===3?8:14;
  // 迭代加深 (根节点用PVS: 首着全窗口, 后续零窗口, fail-high重搜)
  for(var d=1;d<=maxDepth;d++){
    if(xqAbort)break;

    var ttMove=null;
    var h=xqH(xqB,aiRed),tt=xqTT.get(h);

        sc=-xqPVS(nb,d-1,-Infinity,Infinity,!aiRed,1);
        fullSearched=true;
      }else{
        // 后续: 零窗口搜索
        sc=-xqPVS(nb,d-1,-al-1,-al,!aiRed,1);
        if(sc>al&&!xqAbort){
          // fail-high: 重搜全窗口
          sc=-xqPVS(nb,d-1,-Infinity,Infinity,!aiRed,1);
          fullSearched=true;
        }
      }
      if(xqAbort)break;
      if(curDiff<=2)sc+=Math.random()*4-2;
      // 只有全窗口搜索的着法才参与候选选择
      if(fullSearched){
        if(sc>ds+0.5){ds=sc;cands=[m]}
        else if(Math.abs(sc-ds)<3)cands.push(m);
      }
      if(sc>al)al=sc;
    }
    if(!xqAbort&&cands.length>0){
      best=cands[Math.floor(Math.random()*cands.length)];
      bestScore=ds;
    }
    if(Math.abs(ds)>98900)break;
  }
  var info='<span class="tag">搜索</span> 深度'+(d-1)+' 节点'+xqNodes;
  if(bestScore>90000)info+=' [优势]';
  else if(bestScore<-90000)info+=' [劣势]';
  showAIInfo(info);
  // 显示胜率 (AI视角,反转给玩家看)
  var wr=scoreToWinRate(bestScore);

  var p=xqB[r][c];
  var canSelect=playerIsRed?xqRedP(p):!xqRedP(p);
  if(p!==0&&canSelect){xqSel=[r,c];xqLegal=xqLegalMoves(xqB,playerIsRed).filter(function(m){return m.fr===r&&m.fc===c});drawXQ()}
}
function xqUpdM(){
  var el=$('xm'),col='abcdefghi';
  el.innerHTML=xqHist.map(function(m,i){
    var n=Math.floor(i/2)+1,red=xqRedP(m.piece),ch=XC_H[m.piece];
    var f=col[m.fc]+(10-m.fr),t=col[m.tc]+(10-m.tr);
    var pf=i%2===0?n+'. ':'  ';
    return'<span style="color:'+(red?'var(--red)':'var(--ink)')+'">'+pf+ch+' '+f+'→'+t+'</span>';
  }).join('  ');
}

// 按钮事件
$('rbtn').onclick=function(){if(curGame==='gomoku')initGomoku();else if(curGame==='go')initGo();else if(curGame==='xq')initXQ()};
$('obtn').onclick=function(){if(curGame==='gomoku')initGomoku();else if(curGame==='go')initGo();else if(curGame==='xq')initXQ()};
$('ubtn').onclick=function(){
  if(curGame==='gomoku'&&!over&&!gAiThink&&gH.length>=2){
    for(var i=0;i<2;i++){var l=gH.pop();if(l)gB[l.y][l.x]=0}
    gLast=gH.length>0?gH[gH.length-1]:null;gCur=1;drawGomoku();updSt();
  }
  else if(curGame==='xq'&&!xqOver&&!xqAi&&xqHist.length>=2){
    for(var i=0;i<2;i++){var m=xqHist.pop();if(m){xqB[m.fr][m.fc]=xqB[m.tr][m.tc];xqB[m.tr][m.tc]=m.captured}}
    xqRed=true;drawXQ();xqUpdM();
  }
};
$('gpbtn').onclick=function(){
  if(!goAi&&!goOver&&goCur===1){
    goPass++;goLast=null;goKo=null;
    if(goPass>=2){goEnd();return}
    goCur=2;
    $('st').innerHTML='思考中<span class="thinking-dot"></span><span class="thinking-dot"></span><span class="thinking-dot"></span>';
    goAi=true;
    setTimeout(function(){
      var m=goMCTS(goB,2,goKo);goAi=false;
      if(!m){goPass++;if(goPass>=2){goEnd();return}}
      else{var r=goTry(goB,m.move[0],m.move[1],2,goKo);if(r.valid){goB=r.newBoard;goKo=r.newKo;goLast={x:m.move[0],y:m.move[1],c:2};if(r.captured.length>0)goCaps[1]+=r.captured.length;drawGo()}goPass=0}
      goCur=1;$('st').textContent='请落子';
    },50);
  }
};
$('grbtn').onclick=function(){if(!goAi&&!goOver){goOver=true;showOver('负','你认输了','lose')}};
$('gsbtn').onclick=function(){if(!goAi&&!goOver)goEnd()};
$('xrbtn').onclick=function(){if(!xqAi&&!xqOver){xqOver=true;showOver('负','你认输了','lose')}};
$('svbtn').onclick=function(){saveCurrentGame()};
$('rpbtn').onclick=function(){openRPModal()};
